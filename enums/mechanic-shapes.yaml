chariot:
  name: circle
  description: |
    A standard point-blank circle affecting targets within its radius.
    Sometimes called a "chariot AoE" after Neul deus Darnus's eponymous attack, [a:2008].
  icon: /images/shapes/circle.svg
defamation:
  name: defamation
  description: |
    Circular like [point-blank AoEs](ms:chariot), but *significantly* larger, often the size of the whole arena.
    Named after the eponymous attack in Alexander: Soul of the Creator (Savage).
dynamo:
  name: donut
  description: |
    Affects targets outside the inner radius of an inverted circle. Or, in other words, a ring or donut that affects targets outside of it.
    Some donut AoEs have an unlimited outer radius, while some can be avoided by being far enough away.
    Sometimes called a "dynamo AoE" after Nael deus Darnus's eponymous attack, [a:2010].
  icon: /images/shapes/donut.svg
in-or-out:
  name: in or out
  description: Either an in ([ms:dynamo]) or an out ([ms:chariot]), followed immediately by the opposite.
cone:
  name: cone
  description: Affects targets within a cone-shaped AoE. A cone can be anywhere from just a few degrees to 179° large.
  icon: /images/shapes/cone.svg
270°:
  name: 270° circle
  description: Affects targets who are within three quarters of a circle. Leaves a safespot behind the circle.
  icon: /images/shapes/270.svg
line:
  name: line
  description: Affects targets who are in-line with the source. Sometimes it hits both in front and behind, other times only in front of the source. To avoid, stay far enough to either side of the source.
  icon: /images/shapes/line.svg
grid:
  name: grid
  description: Affects targets who are in-line with several sources at the edges of the arena.
  icon: /images/shapes/grid.svg
plus:
  name: plus
  description: Affects targets who are on one of the source's four cardinals. To avoid, stay at the source's intercardinals.
  icon: /images/shapes/plus.svg
cross:
  name: cross
  description: Affects targets who are on one of the source's four intercardinals. To avoid, stay at the source's cardinals.
  icon: /images/shapes/cross.svg
sides:
  name: sides
  description: Affects targets who are not in-line with the source. Hits both in front and behind the source. To avoid, stay in a line with the source.
  icon: /images/shapes/sides.svg
rect:
  name: rectangle
  description: Affects targets within a rectangular area.
  icon: /images/shapes/rectangle.svg
halfroom:
  name: halfroom
  description: Affects anyone on the unsafe side of the source. Cannot be outranged. To avoid, the only option is to stay on the other side.
  icon: /images/shapes/halfroom.svg
star:
  name: star
  description: Spawns multiple line AoEs from a central point, usually one line per [t:principal].
  icon: /images/shapes/star.svg
