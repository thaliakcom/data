  gaze-of-the-void:
    id: 50002
    mechanic: mech
    compact: full
    emphasis: more
    description: |
      Miniature black holes appear in a rotating manner around [boss].
      There are 10 in total, with the last two overlapping with the first two. When the cast completes, the black holes fire a cone out towards the edge of the arena in the order in which they appeared, creating new black holes at the edge of the arena where the cone hits. Each cone inflicts [s:vulnerability-up].
      The last two cones each hit an existing black hole, causing it to grow bigger.
      Once all cones have resolved, each resulting black hole tethers to [boss] and begin traveling towards him. Four tethers are purple and four yellow, and of the two big black holes, there is always one per tether. The yellow-tethered black holes move much faster than the purple ones. If any of them reach [boss], it triggers [a:big-burst-orb], dealing massive damage and inflicting [s:sustained-damage] on all party members.
      When a player touches a black hole as it moves towards [boss], the black hole is nullified, dealing heavy damage in a radius around it ([a:burst]) and inflicting [s:magic-vulnerability-up] for 5 seconds. If the explosion only hits a single player, that player is knocked off the platform. Knockback immunity is ineffective against this.
      The two big black holes deal significantly more damage in a much bigger radius than the others when touched ([a:violent-burst]).
    resolve: |
      Dodge the cones as normal. After dodging, rotate your camera towards the last two cones, as these will be the locations of the two big black holes. These two big black holes must be soaked by the tanks. For the remaining black holes, use a simple [t:snake prio]: healers take the first set of small black holes clockwise from the big ones, melees the second, and rangeds the third. Always soak the yellow black hole first, then the purple ones after your [s:magic-vulnerability-up] has expired.
      Be careful of soaking a black hole next to another black hole of the same tether colour, as the two soaks can easily clip each other, especially if one of them is the tanks'.
