      * [ms:dynamo:c] on [boss] and [point-blank AoE](ms:chariot) on a black hole
      * [Point-blank AoE](ms:chariot) on [boss] and [ms:dynamo] on a black hole
      * [Point-blank AoE](ms:chariot) on [boss] and [point-blank AoE](ms:chariot) on a black hole
