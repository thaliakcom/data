    description: |
      2 towers spawn on the west of the arena and 2 towers on the east.
      After being soaked, each tower inflicts [s:gauntlet-taken] and [s:dark-resistance-down-ii] on the player who soaked it and spawns an add. The add is tethered to the player, can only take damage from that player, and if the player attempts to move too far away from their add, they are forcibly pulled back.
      The add's name and mechanics depend on the role of the player who is tethered to it.
      * Tanks spawn a Protective Shadow. It casts an interruptible tankbuster called [a:drain-touch], followed by a non-interruptible tankbuster called [a:weight-of-nothing].
