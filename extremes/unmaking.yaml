  naught-hunts:
    id: 49992
    mechanic: aoe.chasing
    shape: chariot
    compact: trim
    emphasis: more
    description: |
      At the start of the cast, spawns two small black holes at opposite [principals](t:principal) and begins charging a [a:passage-of-naught] that leaves the middle safe.
      Each black hole tethers to a random player via an arrow. When the cast ends, [a:passage-of-naught] resolves and both mini black holes use [a:endless-chase], which causes them to begin chasing the tethered player. Each black hole emits a moderately large [ms:chariot] AoE every ¾ of a second, dealing heavy damage and inflicting [s:vulnerability-up] ([a:endless-chase-hit]).
      Each black hole hits 24 times in total before it stops and disappears. After the first 5 hits another arrow appears, tethering itself to a different player. 7 hits later, each black hole abruptly switches targets to this new player and begins chasing them instead.
      After the black holes stop chasing, another [a:passage-of-naught] takes place, with both line AoEs hitting the center this time.
      **Other notes**:
      * [a:naught-hunts] takes place twice in succession. Throughout both casts of this mechanic, each player will be chased by exactly one black hole.
      * If a player who is being chased dies, that black hole instantly switches targets to a random, untelegraphed player and begins chasing them instead.
      * The speed of the black holes while chasing narrowly exceeds the default speed of player characters. This means that the black hole will slowly catch up to players, and if it does (e.g. because the player briefly stopped) it is no longer possible to escape it by any means, even with [a:sprint].
    resolve: |
      Each targeted player takes their black hole clockwise around the arena. Do not try to maintain melee uptime if the rest of the party doesn't expect you to, as you will clip the players in the middle.
      Some strategies prefer for the second set of chasers during each [a:naught-hunts] to take their black hole counter-clockwise instead to minimize movement while prepositioning. Please be aware that the entire party must be on board with this if you decide to do this, as two players who each rotate a different way is almost guaranteed to cause a wipe.
      [a:sprint] is strongly recommended to give yourself more leeway and prevent the black hole from being able to catch up to you.
    children:
    - at: 0
      id: passage-of-naught
      link: and
    - at: 82
      id: endless-chase
      flatten: omit-children
    - at: 22312
      id: passage-of-naught
  endless-chase:
    id: 48475
    mechanic: aoe.chasing
    compact: full
