      All players are assigned a [m:mech.limit] marker. A short while later, a line AoE fires at each player in the *opposite* order of the prior [a:ultima-blaster] pulses.
      **Example**: [boss]'s initial raidwide pulse goes from west to east. Subsequent pulses proceed clockwise. For [a:ultima-blaster-lc], the first line AoE originates from west and subsequent line AoEs proceed **counter**-clockwise.
