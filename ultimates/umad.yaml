      Chaos inflicts various debuffs on all players.
      * 4 random players are inflicted with [s:headwind].
      * The other 4 players are inflicted with [s:tailwind].
      * 1 random support and 1 random DPS are inflicted with [s:entropy].
      * 1 random support and 1 random DPS are inflicted with [s:dynamic-fluid].
