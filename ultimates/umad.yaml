  tele-trouncing:
    id: 47801
    mechanic: mech
    emphasis: more
    compact: trim
    description: |
      Inflicts [s:tele-portent-up], [s:tele-portent-right], [s:tele-portent-down], or [s:tele-portent-left] on all players.
      All players are inflicted with two of these status effects. The second resolves three seconds after the first.
      Exactly one player is inflicted with 2× [s:tele-portent-up], one player with 2× [s:tele-portent-down], etc. The other 4 players are inflicted with mixed Tele-Portent directions.
      When any of these effects resolve, it places a sigil on the ground that teleports a player in the indicated direction if they step on it later.
      Players are now tethered to either the left or right side of the statue. All players of the same role are tethered to the same side of the statue. The left side will inflict [s:confused], the right side [s:sleep].
      A few seconds after [a:double-trouble-trap-hit], tethers resolve. All tethered players are also targeted with a [m:spread] AoE at the same time, preventing stacking.
