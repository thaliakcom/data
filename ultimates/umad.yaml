    description: Exdeath knocks all players away from him. Can be avoided using [s:arms-length] or [s:surecast].
  aetherlink:
    id: 49892
    name: Aetherlink
    mechanic: mech
    description: |
      Chaos and Exdeath equalize their HP.
      Mathematically, the boss with the higher HP transfers half of the HP difference between them and the other boss to the other boss.
  ultima-blaster-lc:
    id: 47844
    name: Ultima Blaster
    mechanic: spread
    shape: line
    count: 8
    damage: 133817
    emphasis: more
    description: The [a:ultima-blaster] pulses come back from where they ended up, firing a line AoE at the correspondingly numbered player. Inflicts [s:magic-vulnerability-up]. Ignores [invulnerability effects](t:invuln).
  max:
    id: 47845
    name: Max
    mechanic: mech
    description: "[boss] becomes big. Really big."
  earthquake:
    id: 50545
    name: Earthquake
    mechanic: mech
    emphasis: more
    description: |
      Sets all players' HP to 1, inflicts players with various status effects, and spawns an earth shape in the middle of the arena.
      * 1 random support and 1 random DPS are inflicted with [s:accretion] (14s).
      * 1 random DPS, 1 random support, and one of the [s:accretion] players are inflicted with [s:first-in-line] and [s:primordial-crust] (72s).
      * 1 random DPS, 1 random support, and the other [s:accretion] player are inflicted with [s:second-in-line] and [s:primordial-crust] (106s).
      * The remaining 2 players are inflicted with [s:third-in-line] and [s:primordial-crust] (139s).
      All debuffs must be cleansed by healing the player to full (in the case of [s:accretion]) or taking lethal damage (in the case of [s:primordial-crust]). Failing to do so before the debuff expires results in instant death.
      Cleansing either [s:accretion] or [s:primordial-crust] triggers an [a:earthquake-hit] from the earth shape in the middle of the arena. This deals raidwide damage and inflicts a 2s [s:earth-resistance-down-ii] on all party members, meaning that cleansing more than one of these effects within a span of 2 seconds wipes the raid.
      Dying at any point while either [s:primordial-crust] or [s:accretion] is still active instantly triggers [a:earthquake-hit].
    resolve: |
      Healers should methodically cleanse [s:accretion] immediately, as this status has a very short duration.
      [s:primordial-crust] should be cleansed via [a:nothingness]. A little while into the phase, Exdeath spawns several sets of of [black holes](a:black-hole) around the arena, some of which tether to players and shortly thereafter fire a line AoE at them ([a:nothingness]).
      [a:nothingness] happens exactly 24 times and cannot be avoided. Each player can soak [a:nothingness] 3× (first gaining [s:unbecoming], the second time gaining [s:meanest-existence], the third time taking lethal damage and thereby cleansing [s:primordial-crust]). It is not possible to survive a fourth hit. 3×8 players is 24 soaks, so if any player at any point takes lethal damage from anything other than [a:nothingness], [a:nothingness] can no longer be cleanly resolved and will result in deaths.
      Ensure that you never have two or more [s:meanest-existence] players take a [a:nothingness] at the same time, as this would result in a wipe.
  earthquake-hit:
    id: 47866
    name: Earthquake
    caption: Hit
    mechanic: raidwide
    damage: 101287
    description: "[s:accretion] or [s:primordial-crust] was cleansed, dealing raidwide damage and inflicting [s:earth-resistance-down-ii] on all players."
