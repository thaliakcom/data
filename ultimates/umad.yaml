      After all eight [a:ultima-blaster]s have executed, all players are assigned limit cut numbers from 1 to 8 above their heads. A short while later, each pulse fires *back* across from where it ended up at the corresponding numbered player in a [ms:line] AoE that inflicts [s:magic-vulnerability-up] ([a:ultima-blaster-lc]).
