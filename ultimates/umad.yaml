      Inflicts [s:tele-portent-up], [s:tele-portent-right], [s:tele-portent-down], or [s:tele-portent-left] on all players.
      All players are inflicted with two of these status effects. The second resolves three seconds after the first.
      Exactly one player is inflicted with 2× [s:tele-portent-up], one player with 2× [s:tele-portent-down], etc. The other 4 players are inflicted with mixed Tele-Portent directions.
