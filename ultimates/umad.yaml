  black-hole:
    id: 47867
    name: Black Hole
    mechanic: mech
    description: |
      Exdeath creates a series of small black holes around the arena. Stepping into one inflicts [s:damage-down].
      Some of the black holes close to the edge of the arena tether to players. The tether can be passed. After a short time, these black holes fire [a:nothingness] at their tethered players, dealing moderate damage and inflicting first [s:unbecoming], then [s:meanest-existence], then death on players.
      This mechanic repeats two more times, but the distribution of [a:nothingness] tethers varies:
      * [a:black-hole] 1: one tether, followed by two tethers.
      * [a:black-hole] 2 and 3: three tethers, followed by three tethers, followed by another three tethers.
      * [a:black-hole] 4: two tethers, followed by one tether.
      **Total**: 24× [a:nothingness], which is the exact number of hits required for every player to be hit once by [a:nothingness] while in [s:meanest-existence].
  nothingness:
    id: 47868
    name: Nothingness
    mechanic: spread.tethers
    shape: line
    damage: 22079
    description: |
      A black hole fires a line AoE at its tethered player, inflicting [s:unbecoming].
      If the player already has [s:unbecoming], inflicts [s:meanest-existence].
      If the player already has [s:meanest-existence], deals 9,999,999 damage.
