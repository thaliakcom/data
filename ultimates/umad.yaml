  mystery-magic-fire:
    id: 47764
    caption: Blizzard and Fire
    mechanic: combination
    compact: trim
    description: |
      Combines either [a:blizzard-iii-blowout] and [a:thrumming-thunder-iii], or [a:blizzard-iii-blowout], and [a:flagrant-fire-iii-stack]/[a:flagrant-fire-iii-spread].
      During the cast, [boss] has two rings around him in the colour of the two elements used for the attack. Either one ring, no ring, or both rings may be decorated with question marks. This indicates that the mechanic is *inverted*. For the AoE mechanics ([a:blizzard-iii-blowout] and [a:thrumming-thunder-iii]) this means that the areas of the arena that do *not* have an AoE telegraph in them are unsafe and the AoE telegraphs are safe. For [a:flagrant-fire-iii-spread]/[a:flagrant-fire-iii-stack], it means that the stack turns into a spread and vice-versa.
    children:
