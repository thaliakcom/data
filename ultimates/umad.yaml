  mystery-magic-blizzard-fire:
    id: 47764
    caption: Ice/Fire
    mechanic: combination
    compact: trim
    description: |
      Combines [a:blizzard-iii-blowout] and [a:flagrant-fire-iii].
      During the cast, [boss] has two rings around him. The upper ring is fire and the lower ring is ice. Either one ring, no ring, or both rings may be decorated with question marks. This indicates that the corresponding mechanic is *inverted*. For [a:blizzard-iii-blowout] this means that the area of the arena that is telegraphed as unsafe is actually safe, and everything outside of the AoE telegraph is unsafe. For fire it means that a [a:flagrant-fire-iii-spread] is actually a stack on one random DPS and one random support, and [a:flagrant-fire-iii-stack] is actually a spread on all players.
