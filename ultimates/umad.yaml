  # Phase 4
  auto-attack-p4:
    id: 49746
    name: Auto-attack
    mechanic: auto.single
    damage: 95527
    emphasis: less
    description: "[boss] kicks the first player in enmity, dealing heavy damage."
  kefka-says:
    id: 49884
    name: Kefka Says
    mechanic: mech
    emphasis: more
    description: |
      Spawns Neo-Exdeath and Chaos on the outside of the arena and prepares to execute various debuff-inflicting mechanics.
      Neo-Exdeath will cast Grand Cross three times and Chaos will cast [a:tsunami-p4] and [a:inferno-p4] in a random order. Each of these casts deals heavy raidwide damage and inflicts various debuffs.
      **These debuffs may be inverted** depending on whether or not Neo-Exdeath/Chaos have [boss]'s question marks surrounding them during the cast. This applies only to the debuffs inflicted by that specific cast. This means that all debuffs or no debuffs could be inverted, or (more likely) a mix of both real and inverted debuffs.
  grand-cross-1:
    id: 47892
    name: Grand Cross
    caption: I
    mechanic: mech.status
    players: 8
    damage: 306476
    description: |
      Deals heavy raidwide damage and inflicts [s:forked-lightning], [s:compressed-water], and [s:cursed-shriek] on 1 DPS and 1 support each, and [s:acceleration-bomb] on 2 DPS and 2 supports.
      Neo-Exdeath may have [boss]-like question marks surrounding him during the cast, in which case all inflicted status effects are inverted (fake).
  grand-cross-2:
    id: 47892
    name: Grand Cross
    caption: II
    mechanic: mech.status
    players: 8
    damage: 306476
    description: |
      Deals heavy raidwide damage and inflicts [s:forked-lightning], [s:compressed-water], and [s:cursed-shriek] on 1 DPS and 1 support each, and [s:acceleration-bomb] on 2 DPS and 2 supports.
      All debuffs have a different duration than the previous set, and no player may be inflicted with a debuff they already have.
      Neo-Exdeath may have [boss]-like question marks surrounding him during the cast, in which case all inflicted status effects are inverted (fake).
  grand-cross-3:
    id: 47892
    name: Grand Cross
    caption: III
    mechanic: mech.status
    players: 8
    damage: 306476
    description: |
      Deals heavy raidwide damage and inflicts [s:black-wound] on 4 random players and [s:white-wound] on the other 4 players. Also inflicts [s:beyond-death] on 2 DPS and 2 supports and [s:allagan-field] on the other 4 players.
      Neo-Exdeath may have [boss]-like question marks surrounding him during the cast, in which case all inflicted status effects are inverted (fake).
  inferno-p4:
    id: 47904
    name: Inferno
    mechanic: mech.status
    players: 8
    damage: 226592
    description: |
      Deals moderate raidwide damage and inflicts [s:dynamic-fluid-p4] on all players.
      Chaos may have [boss]-like question marks surrounding him during the cast, in which case all [s:dynamic-fluid-p4] are inverted (fake).
  tsunami-p4:
    id: 47905
    name: Tsunami
    mechanic: mech.status
    players: 8
    damage: 234208
    description: |
      Deals moderate raidwide damage and inflicts [s:entropy-p4] on all players.
      Chaos may have [boss]-like question marks surrounding him during the cast, in which case all [s:entropy-p4] are inverted (fake).
  flood-of-naught:
    id: 50067
    name: Flood of Naught
    mechanic: aoe
    shape: line
    description: |
      The left half of the arena is [a:white-antilight], the right half is [a:black-antilight] (or vice-versa), and the middle is [a:edge-of-death].
  edge-of-death:
    id: 50070
    name: Edge of Death
    mechanic: aoe
    shape: line
    description: A thin strip in the middle of the arena during [a:flood-of-naught]. Instantly kills any player hit.
  white-antilight:
    id: 50068
    name: White Antilight
    mechanic: aoe
    shape: line
    players: 2
    damage: 34264
    description: |
      Players standing in this [ms:line] take a small amount of damage if they have [s:white-wound] (real) or [s:black-wound] (fake), otherwise they take no damage.
      Players who fail to take damage are instantly killed with [s:beyond-death] (real) or [s:allagan-field] (fake), while players who do take damage wipe the raid if they have [s:allagan-field] (real) or [s:beyond-death] (fake).
  black-antilight:
