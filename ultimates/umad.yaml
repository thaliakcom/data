  stray-apocalypse:
    id: 47931
    name: Stray Apocalypse
    mechanic: aoe.exaflares
    shape: chariot
    description: |
      Spawns multiple exaflares originating from northwest and northeast.
      There are, in total, 6 sets of exaflares – 3 coming from northwest and 3 from northeast. All exaflare sets are composed of two [ms:chariot] AoEs that rapidly move through the arena in a straight line from their point of origin, inflicting [s:damage-down] on anyone hit. No two AoEs can spawn right beside each other; there is always a gap in-between.
      The first set always spawns from northwest, the second from northeast, the third from northwest again, and so on.
      [a:stray-apocalypse] is immediately followed by [a:stray-entropy], a [m:spread] on all players.
    resolve: |
      These are some of the simplest exaflares we have seen so far, simpler even to resolve than Golden Bahamut's exaflares. Look northwest at the start of the cast and position yourself outside the path of the first set of exas. Then look northeast and, **without leaving the safe row for the first set of exas**, move in a straight line so you're now in the safe row for the second set of exas too. Repeat until done.
      Each exaflare set always has a safe row in melee range, so you do not need to leave melee range for this mechanic.
      During the last set of exas, find your [clock spot](t:clock spots) because [boss] has already started casting [a:stray-entropy], which requires you to be there immediately after the last set of exas has concluded.
  stray-entropy:
