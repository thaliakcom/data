status:
  damage-down:
    id: 2911
    type: impairment
    duration: 180000
    description: |
      Reduces damage dealt by 90% for 3 minutes.
      Inflicted by any avoidable source of damage, including [a:blizzard-iii-blowout], [a:thrumming-thunder-iii], [a:ave-maria], [a:indolent-will], or auto-attacks from [s:confused] players.
  magic-vulnerability-up:
    id: 2941
    type: vuln
    duration: [960, 3960]
    description: |
      Renders any magic damage taken lethal.
      Inflicted by various actions, including [a:flagrant-fire-iii-stack], [a:wave-cannon], [a:flagrant-fire-iii-spread], [a:idyllic-will].
  double-trouble-trap:
    id: 5078
    name: Double-trouble Trap
    type: delay
    duration: [5000, 68000]
    description: |
      Triggers [a:double-trouble-trap-hit] when the effect expires, dealing shareable damage to the affected players and passing [s:double-trouble-trap] to a random player amongst those hit by [a:double-trouble-trap-hit].
      When this effect is initially inflicted by [a:double-trouble-trap], it resolves after only 5 seconds. Every subsequent instance of this debuff (after being passed to another player), it resolves after over a minute.
    gameDescription: When this effect expires, everyone else in the immediate vicinity will take damage. Should any player take damage, the [s:double-trouble-trap] will be passed to one of them.
  tele-portent-down:
    id: 4877
    name: Tele-Portent (South)
    type: delay
    duration: [10000, 7000]
    description: When the effect expires, places a sigil on the ground. Any player who steps on this sigil later is teleported a short distance towards the south of the arena.
  tele-portent-up:
    id: 4876
    name: Tele-Portent (North)
    type: delay
    duration: [10000, 7000]
    description: When the effect expires, places a sigil on the ground. Any player who steps on this sigil later is teleported a short distance towards the north of the arena.
  tele-portent-right:
    id: 4878
    name: Tele-Portent (East)
    type: delay
    duration: [10000, 7000]
    description: When the effect expires, places a sigil on the ground. Any player who steps on this sigil later is teleported a short distance towards the east of the arena.
  tele-portent-left:
    id: 4879
    name: Tele-Portent (West)
    type: delay
    duration: [7000, 10000]
    description: When the effect expires, places a sigil on the ground. Any player who steps on this sigil later is teleported a short distance towards the west of the arena.
  bind:
    id: 2518
    type: impairment
    duration: 1000
    description: For a brief moment, affected players are unable to move but can still execute actions.
  confused:
    id: 1283
    type: impairment
    duration: 6000
    description: |
      Affected players run towards the closest player. If they are able to reach another player, they will auto-attack them dealing lethal damage and inflicting [s:damage-down].
      Note that movement speed while [s:confused] *is* affected by any status effects that affect movement speed, such as [s:expedience] or [s:sprint].
      Inflicted by [a:indulgent-will].
  sleep:
    id: 4894
    type: impairment
    duration: 6000
    description: |
      Affected players fall asleep, preventing them from moving or executing actions. If a sleeping player takes damage, they are woken up.
      Inflicted by [a:idyllic-will].
