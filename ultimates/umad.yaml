      Also spawns three sigils in the arena (a water square, wind diamond, and fire triangle). These three sigils are always 90° offset from each other. All three sigils target the closest player or players with a mechanic after a corresponding elemental debuff is cleansed:
      * The water square targets the closest player(s) with [a:tsunami], a small [m:spread] AoE, whenever a [s:dynamic-fluid] is cleansed.
      * The fire triangle targets the closest player(s) with [a:inferno], a moderately large [ms:dynamo] AoE, whenever an [s:entropy] is cleansed.
      * The wind diamond targets the closest player(s) with [a:cyclone], a moderately large [m:stack.partner], whenever a [s:headwind]/[s:tailwind] is cleansed.
      Be aware that this entire mechanic is essentially a long [t:body check]. If any player dies at any point, all their debuffs are considered to be "cleansed", triggering [a:tsunami] or [a:inferno] and [a:cyclone]. Since [a:cyclone] cannot be survived solo, it is likely to kill whomever it targets, triggering a chain reaction of [a:cyclone]s until everyone is dead.
