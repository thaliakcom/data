    id: 48370
    caption: I
    mechanic: mech
    emphasis: more
    compact: trim
    description: |
      Lifts the statue in the background and tethers either all DPS or all supports, then casts [a:mystery-magic-blizzard-fire].
      The tethered players are knocked back away from north just before [a:mystery-magic-blizzard-fire] finishes casting. When [a:mystery-magic-blizzard-fire] finishes casting, [a:blizzard-iii-blowout] and [a:flagrant-fire-iii-spread]/[a:flagrant-fire-iii-stack] resolve, though these can also be inverted (see [a:mystery-magic-blizzard-fire] for more information).
      Afterwards, the statue fires a [a:wave-cannon] at 2 random DPS and 2 random supports, inflicting [s:magic-vulnerability-up] on everyone hit and spawning towers underneath the targeted players. Soaking a tower deals heavy damage ([a:explosion]) while failing to soak a tower inflicts [s:damage-down] on all players ([a:unmitigated-explosion]).
      **Note**: If neither [a:double-trouble-trap-hit] hits any other player here (and both debuffs fall off as a result), [boss] omits his next voiceline "Hook, line, and stinker!".
