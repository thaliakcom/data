      * [s:allagan-field] (real): Deals 66,000 damage, causing [s:allagan-field] to deal 660,000 raidwide damage upon expiration.
      * [s:allagan-field] (fake): Deals 66,000 damage, causing [s:allagan-field] to deal 9,990 raidwide damage upon expiration.
      This action deals a fixed amount of [dt:dark] damage. It cannot be shielded or mitigated.
