actions:
  puzzle:
    name: Puzzle
    mechanic: hint
    description: |
      Expand this row to learn about this fight's puzzle mechanics.
      This fight has several puzzle mechanics that must be correctly resolved in phase 1 or the fight simply kicks players out of the instance after phase 2. Here's a list of all prerequisites:
      * [s:double-trouble-trap] must always be passed to another player. If it is any point allowed to expire by not passing it to another player, the puzzle is failed. This includes the last pass during [a:tele-trouncing], where the debuff is not reapplied despite being passed.
      * During [a:graven-image-2], all gravity wells (puddles) must be soaked after transforming ([a:gravity-iii]). If any gravity wells are permitted to fade away naturally, the puzzle is failed.
      * During [a:tele-trouncing], all teleportation sigils must be utilized (stepped on) *in sequence* by a [s:confused] player. If any teleportation sigils are permitted to fade away naturally, *or* any teleportation sigils are stepped on by a player who is *not* [s:confused], the puzzle is failed.
      To know whether you fulfilled the conditions for the puzzle mechanics so far, [boss] changes his voiceline after all three of the above mechanics:
      * If [s:double-trouble-trap] is not passed the first time it is applied by [a:double-trouble-trap], [boss] says nothing. Otherwise he says "Hook, line, and stinker!"
      * If the gravity wells are *not* soaked, [boss] says nothing. Otherwise he says "What?! There's no way that didn't work!" after the next [a:hyperdrive].
      * If any prerequisites for the puzzle are *not* met, [boss] says these three voicelines in succession: "Yes... I am filled with glorious purpose!" -> "Life... Dreams... Hope... Where do they come from? And where do they go?" -> "Such things as those are mine to destroy!" If all prerequisites are met, these three voicelines are replaced by: "How boring. Guess I'll have to spice things up!" -> "Intriguing. This clearly isn't your first time." -> "This is meant to be our ultimate encounter." -> "Crafty little bastards, aren't you?"
      If these new three voicelines play at the end of phase 1, killing [boss] in phase 2 transitions the fight into phase 3. If the original voicelines play, killing [boss] in phase 1 ends the fight and kicks players out of the instance.
