  confused:
    id: 1283
    type: impairment
    duration: 6000
    description: |
      Affected players run towards the closest player. If they are able to reach another player, they will auto-attack them, dealing lethal damage and inflicting [s:damage-down].
      **Note**: Movement speed during [s:confused] *is* affected by any status effects that affect movement speed, such as [s:expedience] or [s:sprint].
      **Note**: After being teleported by a teleportation sigil, [s:confused] players do not begin to move towards the next closest player again until the next server tick. This means that sometimes a [s:confused] player may stop and pause for over a second after being teleported, while other times they may start moving towards the closest player immediately and kill them. There is no way to avoid this except by chain-teleporting at least three times.
