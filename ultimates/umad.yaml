    damage: 171722
    description: Simple spreads on all players, dealing moderate damage and inflicting [s:magic-vulnerability-up].
  forsaken-p5:
    id: 47925
    name: Forsaken
    mechanic: enrage.soft
    damage: 426246
    emphasis: more
    compact: full
    description: |
      Extremely heavy raidwide that begins the enrage sequence.
      The enrage sequence begins of 4 sets. For each hit there is:
      * A large telegraphed AoE on the cardinal or intercardinal closest to the party ([a:forsaken-aoe]).
      * Two large telegraphed puddle AoEs on a random cardinal or intercardinal. (Or the middle for the first set.) Leaves behind a puddle that, when entered at any point, inflicts [s:forsaken] ([a:forsaken-ground]).
      * A full party stack on a telegraphed player ([a:forsaken-bonds]) that deals extremely high damage.
      * A few seconds later, another [a:forsaken-p5-hit] raidwide that deals extremely high damage and begins the next set.
      Note that the intercardinal [Forsaken Grounds](a:forsaken-ground) are placed farther away from the center of the arena than the cardinal ones. This means that intercardinal [Forsaken Grounds](a:forsaken-ground) leave enough space to pass by while cardinal [Forsaken Grounds](a:forsaken-ground) do not.
      If any player is still alive by the end of this soft enrage sequence, [boss] begins to cast [a:forsaken-null], which inflicts [s:forsaken] on all players and ends the fight.
    resolve: |
      Move as a party, in a coordinated manner. This is one of the hardest hitting raidwide sequences in the entire game, so a proper mitigation plan is *essential*.
      Do not be afraid of moving through [a:forsaken-aoe] telegraphs to reach a larger safe spot. Keep moving to avoid getting cornered by [a:forsaken-ground].
