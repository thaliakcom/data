  forsaken:
    id: 47804
    mechanic: mech
    players: 8
    damage: 562117
    emphasis: more
    compact: full
    description: |
      Heavy raidwide that inflicts [s:spells-trouble:4] on all players and spawns a series of towers.
      This is a mechanic composed of **eight sets**. Each set is composed of exactly two adjacent towers. The requirements for this mechanic are relatively simple:
      * During each set, each tower must be soaked by exactly two players. Soaking a tower with any more or less players deals heavy damage and inflicts [s:damage-down] on the entire party.
      * After all eight sets, all players' [s:spells-trouble] stacks must be cleansed. [a:light-of-judgment-p2] instantly kills any player with any remaining [s:spells-trouble] stacks. A stack of [s:spells-trouble] is cleansed whenever the afflicted player soaks a tower.
      While this sounds relatively simple, there are additional complications:
      * Each stack of [s:spells-trouble] represents a specific type of **spell**. Whenever a stack of [s:spells-trouble] is cleansed, the corresponding spell triggers and must be resolved correctly (see below). The possible types of spells are: [ms:cone], [ms:chariot], and [m:stack].
      * The spell corresponding to a stack of [s:spells-trouble] is **only briefly shown** as a headmarker on top of the character model after the initial [a:forsaken] cast, and every time a player soaks a tower and cleanses a stack afterwards. Once this indicator disappears, there is no longer any way to check which spell your next [s:spells-trouble] stack represents. Players must remember their spell for potentially long periods of time, as each type of spell is resolved in a different way.
      * There is a difference between even and odd sets of towers: during **even** tower sets, [boss] casts either [a:futures-end] or [a:pasts-end]. This resolves at the same time as the towers themselves and results in 3 clones and [boss] jumping on and inflicting [s:magic-vulnerability-up] on the 4 closest players to [boss]. A short while later, all clones and [boss] turn towards :unverified(a random player) and begin casting [a:all-things-ending]. This is a [ms:halfroom] cleave that hits either *in front of* (if [a:futures-end] was cast before) or *behind* (if [a:pasts-end] was cast before) the clone/[boss] and resolves at the same time of the next *odd* tower set.
      **Spells:**
      * **[ms:cone:c]**: Fires an approximately 90° cone towards the *closest* player, dealing damage and inflicting [s:magic-vulnerability-up] ([a:spellwave]).
      * **[ms:chariot:c]**: A moderately large point blank AoE that deals damage and inflicts [s:magic-vulnerability-up] ([a:spellscatter]).
      * **[m:stack:c]**: A moderately large (same size as the [ms:chariot]) point blank stack that deals lethal damage unless soaked with at least 3 players. Inflicts [s:magic-vulnerability-up] ([a:spelldriver]).
      **Distribution of spells:**
      The spells distributed during the initial [a:forsaken] cast are role-based:
      * 3 supports or DPS get [ms:chariot]s.
      * 3 players of the opposite role get [ms:cone]s.
      * 1 support and 1 DPS get [m:stack]s.
      The spells distributed when towers are soaked are **not** role-based:
      * During odd sets, 1 player gets [ms:cone], 1 player gets [ms:chariot], and 2 players get [m:stack].
      * During even sets, 2 players get [ms:cone] and 2 players get [ms:chariot].
      * There is one exception to this: the last two sets of towers always distribute 4 [m:stack]s. In most cases, this doesn't matter, as these towers would cleanse their soakers' last [s:spells-trouble] stack, so no new spell is generated at all. The 4 stacks are a kind of failstate to prevent players from executing unintended strategies.
    resolve: |
      Odd tower sets should be soaked by 1× [ms:cone], 1× [ms:chariot], and 2× [m:stack] players and even towers by 2× [ms:cone] and 2× [ms:chariot] players. The stacks may not resolve during even tower sets because even tower sets require 4 players to bait clones (from [a:futures-end]/[a:pasts-end]). This inflicts [s:magic-vulnerability-up], so these players cannot soak a spell at the same time.
      Additionally, because each odd tower set generates 2 [ms:cone]s and 2 [ms:chariot]s and each even tower set generates 1 [ms:cone], 1 [ms:chariot], and 2 [m:stack]s (in other words: each tower set generates the exact spells "required" for the next tower set), it's important that all towers are soaked by players with the exact spells generated by the *next* tower set, otherwise subsequent tower sets may end up with an unresolvable distribution of spells (for instance, 3 or more stacks during one set).
      It's recommended to split all players into two groups after the [a:forsaken] cast based on their initial spells. The group you end up in determines which tower sets have you inside a tower and which tower sets have you outside a tower.
      The easiest way to sort players into two groups is to assemble into **role pairs** during the [a:forsaken] cast, for instance by pairing each tank with a healer and each ranged DPS with a melee DPS. This allows a simple decision making process once the initial spells are distributed:
      * If either you or your partner have [m:stack], you belong to the first group (group "A").
      * If you and your partner have the same spell, you belong to the second group (group "B").
      You'll also want to designate one player per pair as the "flex" player. (Usually, this role falls to tanks and melees.) These players must adjust to the other tower if their role partner has the same spell as them.
      Which tower set which group is responsible for, and what the concrete positions of everyone during a tower set are, depends on the specific strategy you opt to use. There are many possible strategy variations.
