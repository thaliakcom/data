    emphasis: more
    compact: full
    description: |
      Heavy raidwide that inflicts [s:spells-trouble:4] on all players and spawns a series of towers.
      Along with [s:spells-trouble:4], a spell indicator appears above every player's head. Three supports or DPS get circular spread AoE indicators. Three players of the other role get conal AoE indicators. The remaining two players get stack indicators. These indicators disappear after a short time.
      Afterwards, spawns two adjacent towers on the inside of the arena. Each tower must be soaked by exactly two players. Any less or more results in the tower exploding for heavy damage and [s:damage-down] on the whole party.
      Whenever a tower is soaked, it triggers the soaking players' indicated spells and reduces their [s:spells-trouble] stacks by one. After 8 sets of towers, [boss] casts [a:light-of-judgment-p2] which instantly kills any player who failed to cleanse all their [s:spells-trouble] stacks.
      Cones always fire towards the closest player to the player whose cone spell resolves ([a:spellwave]). Circles ([a:spellscatter]) and stacks ([a:spelldriver]) resolve on the player themselves. Any time a player cleanses a stack of [s:spells-trouble], a new spell indicator appears above their head and the next executed spell changes. This follows a specific logic: every **odd** tower set generates 2 circles and 2 cones, while every **even** tower set generates 2 stacks, 1 cone, and 1 circle.
      Additionally, during every even tower set [boss] casts either [a:futures-end] or [a:pasts-end], where he dashes towards the 4 closest players, deals heavy damage to them in a radius, and leaves behind a clone. A short time later (before the next tower set), they face towards :unverified(the now closest player) and begin casting [a:all-things-ending], a [ms:halfroom] cleave either in front ([a:futures-end]) or behind ([a:pasts-end]) that resolves during the next odd tower set.
