  maddening-orchestra:
    id: 47952
    name: Maddening Orchestra
    mechanic: combination
    emphasis: more
    description: |
      Targets multiple players with multiple sets of AoEs.
      **First set:**
      * First-in-enmity is targeted by [a:flare], a moderately large AoE that deals heavy damage and inflicts a brief [s:magic-vulnerability-up] and [s:surprise-flare].
      * Second-in-enmity is targeted by [a:flare], a moderately large AoE that deals heavy damage and inflicts a brief [s:magic-vulnerability-up] and [s:surprise-holy].
      * 3 other random players are targeted by [a:holy-random], a moderately large AoE that deals heavy damage and inflicts a long [s:magic-vulnerability-up].
      **Second set:**
      * First-in-enmity is targeted by [a:chaotic-flare], a moderately large [m:tb.stack].
      * The three closest players to [boss] are targeted by [a:holy-proximity], a moderately large AoE that deals heavy damage and inflicts a long [s:magic-vulnerability-up].
      **Third set:**
      * [s:surprise-flare] resolves in a massive [ms:defamation]-type AoE that deals heavy damage and inflicts [s:magic-vulnerability-up] ([a:flare-diffusion]).
      * [s:surprise-holy] resolves in a moderately large [m:stack.party] ([a:chaotic-holy]).
    resolve: |
      **First set**: Everyone spreads outside [boss]'s hitbox as overlapping AoEs is lethal. Both tanks should be next to each other (but spread), so they can collapse together to share [a:chaotic-flare] during the second set.
      **Second set**: Tanks collapse to share [a:chaotic-flare]. Everyone who was *not* hit by [a:holy-random] during the first set moves into [boss]'s hitbox.
      **Third set**: The off-tank (with [s:surprise-holy]) uses [a:provoke], as the [s:surprise-flare] tank has to move to the edge of the arena and would drag the boss out of center doing so, which would make subsequent mechanics significantly more difficult. The [s:surprise-holy] tank is meant to stack with the party here, but the current most common strategy has the [s:surprise-holy] tank stay inside the [a:flare-diffusion] [ms:defamation] to solo the stack with [t:invuln]. This has the additional benefit of covering the next few [a:fell-forces] as well.
