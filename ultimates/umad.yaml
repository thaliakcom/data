  celestriad:
    id: 47938
    name: Celestriad
    mechanic: towers.double
    emphasis: more
    compact: full
    description: |
      Spawns 9 elemental towers around the arena and inflicts 2 players with [s:fire-resistance-down-ii], 2 players with [s:lightning-resistance-down-ii], and 2 players with [s:ice-resistance-down-ii].
      The towers spawn in a random configuration, but there are always 3 fire towers, 3 lightning towers, and 3 ice towers. All towers belonging to the same element are guaranteed to always be beside each other. All towers are 2-person towers and will explode if soaked with less players. A tower that explodes deals mild raidwide damage and inflicts [s:damage-down] on all players.
      There are three sets of tower resolutions. Each set involves all 4 towers and all 3 elements. This means that two elements will feature one tower resolving and the last element will feature two towers resolving. Towers that are about to resolve begin to glow. Towers that have already resolved do not disappear, but they are inactive for the rest of the mechanic and cannot resolve again.
      The three elemental vulnerability debuffs each last for 20 seconds. When a tower resolves, it applies the corresponding Resistance Down debuff on the players who soaked it. This debuff lasts for the rest of the mechanic. The debuffs that are inflicted by the [a:celestriad] cast itself, however, expire just before the last set of towers resolves.
      At the same time as the first and third set of towers, [boss] casts [a:catastrophic-choice], during which he is surrounded with a green wind aura or a yellow earth aura. At the end of the cast, this represents a [point-blank AoE](ms:chariot) (earth) or a [ms:dynamo] AoE. The edge of both types of AoEs cover exactly half of all towers, provided [boss] is positioned dead center.
    resolve: |
      After the initial cast, 6 players will have debuffs. These players find the three towers that correspond to their debuff (e.g. if you have [s:ice-resistance-down-ii], you find the three ice towers). These players will be soaking the active tower that belongs to the three elemental towers **clockwise** of the towers they have a vulnerability for. If there are *two* active towers belonging to this element during this set, these players soak the **leftmost** active tower (counter-clockwise).
      The 2 players without debuffs must soak the duplicate active elemental tower, i.e. the second active tower for the element that has two active towers, because no other player can soak that tower. These players need simply check which element has two active towers and soak the **rightmost** (clockwise) one each time.
      Watch out for [a:catastrophic-choice].
    children:
    - at: 8486
      id: catastrophic-choice
      link: and
    - at: 9157
      id: fire-iii-tower
      link: and
    - at: 9157
      id: thunder-iii-tower
      link: and
    - at: 9157
      id: blizzard-iii-tower
    - at: 15182
      id: fire-iii-tower
      link: and
    - at: 15182
      id: thunder-iii-tower
      link: and
    - at: 15182
      id: blizzard-iii-tower
    - at: 20618
