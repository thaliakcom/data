    damage: 32562
    description: |
      Players standing in this [ms:line] take a small amount of damage if they have [s:black-wound] (real) or [s:white-wound] (fake), otherwise they take no damage.
      Players who fail to take damage are instantly killed with [s:beyond-death] (real) or [s:allagan-field] (fake), while players who do take damage wipe the raid if they have [s:allagan-field] (real) or [s:beyond-death] (fake).
  death-surge:
    id: 47900
    name: Death Surge
    mechanic: mech.check
    count: 4
    players: 8
    damage: 8397
    description: |
      [s:allagan-field] (real) or [s:beyond-death] (fake) resolves, dealing little to no damage if affected players took no damage from [a:flood-of-naught], otherwise wipes the raid.
  mana-charge:
    id: 47780
    mechanic: mech.store
    description: |
      Stores the truthiness of the next [a:thrumming-thunder-iii] and [a:blizzard-iii-blowout], then applies those truthiness states during [a:mana-release].
      Grants [boss] [s:mana-charge].
  death-bolt:
    id: 47897
    name: Death Bolt
    mechanic: stack
    shape: chariot
    count: 2
    players: 3
    damage: 174542
    description: |
      [s:forked-lightning] resolves in the form of a [m:spread] (real) or 3-player [m:stack] (fake) on two players.
  death-wave:
    id: 47898
    name: Death Wave
    mechanic: spread
    shape: chariot
    count: 2
    damage: 167701
    description: |
      [s:compressed-water] resolves in the form of a [m:stack] (real) or 3-player [m:spread] (fake) on two players.
  death-shriek:
    id: 47894
    name: Death Shriek
    mechanic: mech.lookat
    count: 2
    description: |
      [s:cursed-shriek] resolves, requiring all players to look at (real) or look away from (fake) the affected players.
  ultima-upsurge:
    id: 49738
    mechanic: raidwide
    damage: 229512
    description: Moderate raidwide.
  stray-flames-p4:
    id: 47906
    name: Stray Flames
    mechanic: aoe.delayed
    shape: chariot
    count: 8
    description: |
      The invisible AoE dropped by [s:entropy-p4] resolves in the form of a [ms:chariot] AoE (real) or [ms:dynamo] (fake), inflicting [s:damage-down].
  mana-release:
    id: 47781
    mechanic: mech
    description: |
      [boss] shows a ring with optional question marks for both thunder and ice, same as during [a:mystery-magic-blizzard-thunder].
      However, he does not execute the AoEs immediately. Instead, he executes [a:blizzard-iii-blowout] and [a:thrumming-thunder-iii] during his next cast right afterward.
      Note that these AoEs combine the truthiness state of **both** the question mark rings during [a:mana-release] and the question mark ring around the preceding [a:blizzard-iii-blowout] and [a:thrumming-thunder-iii]. A double negative (e.g. ice question marks during [a:blizzard-iii-blowout] and [a:mana-release]) results in a positive, meaning that the attack is real and not inverted.
  stray-spray-p4:
    id: 47908
    name: Stray Spray
    mechanic: aoe.delayed
    shape: dynamo
    count: 8
    description: |
      The invisible AoE dropped by [s:dynamic-fluid-p4] resolves in the form of a [ms:dynamo] AoE (real) or [ms:chariot] (fake), inflicting [s:damage-down].
