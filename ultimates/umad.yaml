  the-path-of-light:
    id: 47806
    mechanic: towers.double
    count: 2
    damage: 0
    description: Two adjacent [t:enumeration] towers resolve, dealing heavy damage and inflicting [s:damage-down] if not soaked by exactly two players ([a:the-river-of-light]). Deals no damage otherwise.
  the-river-of-light:
    id: 47807
    mechanic: mech.failure
    description: A tower explodes as a result of not being soaked by exactly 2 players, inflicting heavy damage and [s:damage-down] on all players.
  spelldriver:
    id: 47808
    mechanic: stack
    shape: chariot
    count: 2
    players: 3
    damage: 196816
    description: A stack [s:spells-trouble] resolves in the form of a 3-player stack on the targeted player. Inflicts [s:magic-vulnerability-up].
  spellwave:
    id: 47810
    mechanic: spread.close
    shape: cone
    damage: 200841
    description: A conal [s:spells-trouble] resolves, firing a cone at the closest player. Inflicts [s:magic-vulnerability-up].
  pasts-end:
    id: 47833
    mechanic: spread.close
    shape: chariot
    count: 4
    damage: 230283
    description: |
      [boss] dashes at the 4 closest players and deals heavy damage to them in a radius, leaving behind clones. Inflicts [s:magic-vulnerability-up].
      A short time later, [boss] and his 3 clones face the :unverified(now closest player) to them and begin casting [a:all-things-ending], a rear [ms:halfroom] cleave that inflicts [s:damage-down] on all players behind [boss] and his clones.
  futures-end:
    id: 47832
    mechanic: spread.close
    shape: chariot
    count: 4
    damage: 173104
    description: |
      [boss] dashes at the 4 closest players and deals heavy damage to them in a radius, leaving behind clones. Inflicts [s:magic-vulnerability-up].
      A short time later, [boss] and his 3 clones face the :unverified(now closest player) to them and begin casting [a:all-things-ending], a frontal [ms:halfroom] cleave that inflicts [s:damage-down] on all players in front of [boss] and his clones.
  spellscatter:
    id: 47809
    mechanic: spread
    shape: chariot
    count: 3
    damage: 207036
    description: A circular [s:spells-trouble] resolves in the form of a moderate circular spread AoE. Inflicts [s:magic-vulnerability-up].
  all-things-ending:
    id: 47836
    mechanic: aoe
    shape: halfroom
    count: 4
    description: "[boss] and his 3 clones execute a [ms:halfroom] cleave behind (if [a:pasts-end] was cast) or in front (if [a:futures-end] was cast) of where they are currently facing. Inflicts [s:damage-down]."
  light-of-judgment-p2:
    id: 47805
    mechanic: raidwide
    damage: 424113
    description: Heavy raidwide. Kills any player with any remaining [s:spells-trouble] stacks.
  trine:
    id: 47839
    mechanic: aoe.3-to-1
    shape: chariot
    description: |
      Three sets of triangles spawn. 12 seconds later, the tips of the triangles explode in the order they spawned. Inflicts [s:damage-down].
      One of the triangle sets may be a large triangle.
      [a:wings-of-destruction] happens right before triangles explode, and [a:wings-of-destruction-tb] at the same time as the last hit.
    children:
    - at: 2855
      id: auto-attack-p2
    - at: 7137
      id: wings-of-destruction
    - at: 9904
      id: auto-attack-p2
    - at: 12934
      id: auto-attack-p2
    - at: 12934
      id: trine-hit
      count: 9
    - at: 14899
      id: trine-hit
      count: 3
    - at: 16905
      id: trine-hit
      count: 9
      link: and
    - at: 17395
      id: wings-of-destruction-tb
  wings-of-destruction:
    id: 47821
    caption: Halfroom
    mechanic: aoe
    shape: halfroom
    description: One of [boss]'s wings begins to glow and cleaves that half of the arena. Inflicts [s:damage-down].
  trine-hit:
    id: 47840
    mechanic: aoe
    shape: chariot
    description: A triangle's tips explode, inflicting [s:damage-down] on any nearby player.
  wings-of-destruction-tb:
    id: 47823
    caption: TB
    mechanic: tb.close-or-far
    shape: chariot
    count: 2
    damage: 646810
    description: Hits the closest and farthest player with a big circular [t:tankbuster].
  light-of-judgment-p2-enrage:
    id: 47841
    mechanic: enrage
    damage: 9999999
    description: |
      If the boss's HP is not depleted by this point, wipes the party.
      **Note**: If Phase 1's puzzle mechanic was not correctly executed (see [a:tele-trouncing]), depleting the boss's HP here simply ends the fight and kicks players out of the instance. Otherwise a cutscene plays and the party advances to Phase 3.
  # Phase 3
