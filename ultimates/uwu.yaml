      This attack also deals damage, but the damage dealt is equal to each individual player's current HP minus one, which means it is not possible for this attack to deal lethal damage. Ordinarily this type of attack would simply be described as "sets all players' HP to 1", but this isn't quite true either. Unlike most other instances of [m:raidwide.sethp] type attacks, this attack does *not* ignore shields, which means that if a player has a shield, their HP is not set to 1 but to (1 + shield value). The shield is consumed in the process.
