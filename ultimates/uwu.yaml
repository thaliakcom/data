  gaols:
    name: Gaols
    mechanic: mech
    major: true
    compact: trim
    description: |
      Titan returns to the arena and immediately begins casting [a:upheaval]. At the same time, five bomb boulders drop onto the opposite side of the arena with [a:bury] and begin casting [a:burst]. There is always one empty spot slightly to the left or to the right where a bomb boulder is missing.
      When the [a:upheaval] cast completes, all players are [stunned](s:stun) and knocked away from Titan's position. The knockback is approximately the entire diameter of the safe zone of the arena, minus the radius of Titan's hitbox. [a:burst] resolves shortly after players' [s:stun] expires, leaving time for only a small microadjustment.
      Afterwards, three random players are visibly targeted for [a:rock-throw] as Titan casts [a:landslide]. Another bomb boulder drops into the empty spot from before at this time, killing any player still there ([a:bury]) and begins casting [a:burst]. The three selected players are encased in a Granite Gaol immediately after [a:landslide]. Titan then casts another [a:landslide], which the Granite Gaol players are now immune to.
      The Granite Gaols immediately begin casting [a:granite-impact]. If this cast is permitted to complete, the party wipes. However, if a Granite Gaol is hit by the last bomb boulder's [a:burst], it is destroyed immediately and the encased player freed. At the same time, the bomb boulder drops a puddle of [s:sludge] and destroys any other bomb boulder in its proximity, leading to the same result.
      The puddles inflict [s:sludge] if players dwell within it after being freed. [s:sludge] is a lethal DoT whose ticks cannot be survived. If Titan dwells within a [s:sludge] puddle, he gains one stack of [s:aetherially-charged] every tick (3 seconds) until 4 stacks, at which point he becomes [s:woken]. This is the only point in the fight where a [s:sludge] puddle can be created.
    resolve: |
      After [a:geocrush], immediately run towards Titan to avoid being hit by any of the bomb boulders' [a:bury]s. Center yourself on Titan's frontal hitbox arrow, then look backwards to see if the safe spot (where a bomb boulder is missing) is left or right, then *slightly* inch towards that side while remaining on the edge of Titan's hitbox. If positioned correctly, [a:upheaval] will knock you directly into the safe spot. After being unstunned, walk forward out of the safe spot immediately to avoid being hit by the [a:bury] of the next bomb boulder that drops directly into this safe spot. **Walk directly forward** on the side that you're on; do not walk towards Titan through the center of the arena, as this has the chance to bait a [a:landslide] directly through the center of the arena, which will make it difficult for the [a:rock-throw] players to position themselves correctly.
      To awaken Titan, it is now necessary for the three players targeted by [a:rock-throw] to form a straight line between the last bomb boulder and Titan. The player closest to the bomb boulder must ensure they get gaoled within the radius of [a:burst]. The second player must ensure they're within the radius of the first player's Granite Gaol, and the third player must ensure they're within the radius of the second player's Granite Gaol while also ensuring Titan is within the radius of their own Granite Gaol.
      Resolving this presents three difficulties:
      First, a very small amount of time passes between players being targeted for [a:rock-throw] and being encased in their Granite Gaol. This means that players cannot spend any time thinking about what to do or where to go. It must be a snap judgment.
      Second, since the [a:rock-throw] assignment is completely random and not role-based, the party must establish a system whereby there is no ambiguity between who goes to which of the three possible spots, as there is no time to communicate or coordinate in any meaningful way here. It is strongly recommended to use a macro that applies a number marker to yourself if you get targeted by [a:rock-throw]. A correctly written macro will apply the first number to your head that is not already taken by another player or enemy. However, Party Finder generally uses third-party tools to assign a number to each player.
      Third, the positioning is very tight. Party Finder generally uses waymarks for assistance here. However, the player farthest from Titan cannot blindly use any waymark; they must inch slightly left or slightly right to ensure they're hit by [a:burst]. Failing to position yourself ensures a very delayed wipe, as it is nigh impossible to kill all three Gaols before they're able to cast [a:granite-impact], and the encased players are invulnerable until then. Even if the three players are freed by [a:burst] and [a:freefire], Titan must already be standing in the third [s:sludge] puddle as he is cast-locked until the [s:sludge] puddles have disappeared. It is not enough for Titan's hitbox to be clipped by the puddle; a significant portion of his hitbox must intersect the puddle.
    tips:
      - Do not use raid buffs until after all three players are freed from their Granite Gaol as they are immune to all status effects, including raid buffs, while trapped within the gaol.
      - If a [a:landslide] is baited through the center, the [a:rock-throw] players should wait until the [a:landslide] telegraph disappears, then *jump* into their waymark. If a player is gaoled mid-jump, their forward momentum is not halted until they touch the ground again, essentially extending their range of movement.
      - But ideally, just don't bait that [a:landslide] through the center of the arena (or in other words, through the gaol markers).
