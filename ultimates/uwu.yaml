  ultimate-suppression:
    id: 11597
    mechanic: mech.trio
    emphasis: more
    compact: trim
    description: |
      [boss:c] becomes untargetable and every previously encountered enemy spawns in the arena at the same time.
      * [boss:c] spawns on the outside of the arena northeast.
      * Garuda spawns at the outside of the arena northwest.
      * Ifrit spawns at the outside of the arena southeast.
      * Titan spawns at the outside of the arena southwest.
      * Suparna spawns close to the center of the arena northwest.
      * Chirada spawns close to the center of the arena southeast.
      Shortly afterwards:
      * Three random players bait four back-to-back [a:eruption-suppression]s.
      * One of those three players is targeted for [a:rock-throw-suppression]. They will be encased in a Granite Gaol immediately after the last [a:eruption-suppression] has been baited, but before it explodes. The [a:eruption] deals no damage to the Granite Gaol or the player within.
      * Two random non-[a:eruption-suppression] players are marked for [a:mistral-song-suppression] by Chirada and Suparna.
      * The player who is not baiting [a:eruption-suppression]s, is not a tank, and is not marked for [a:mistral-song-suppression] is targeted by [a:light-pillar]. [a:light-pillar] has no target marker of any kind.
      Tanks are never targeted for any of these mechanics.
      At the same time as all these mechanics resolve, four Featherlances spawn near the edge of the arena and begin to circle the arena counter-clockwise. If any player gets too close to the edge of the arena and touch one of these Featherlances they will explode, instantly killing them and all nearby players.
      Many AoEs happen during this mini-phase. There are three [a:feather-rain]s, one [a:mistral-song-cone] (which has nothing to do with [a:mistral-song-suppression] and is merely a large conal AoE originating from Garuda), three [a:aetherochemical-laser]s, a [a:landslide-woken] toward a random player, one last [a:mesohigh-suppression] tether from Garuda at the northwest, a [a:flaming-crush], and a [a:tank-purge].
    resolve: |
      Tanks preposition at the southwest of the arena, roughly as close to the center of the arena as Chirada and Suparna. One tank is slightly inched towards Chirada, the other towards Suparna.
      Everyone else should begin the mechanic at an arbitrary location on the edge of the arena somewhere between the west and north. It is vital that no two players are stacked at this point. This is because of [a:light-pillar] which, as mentioned, targets the player who isn't targeted by anything else. To identify the [a:light-pillar] player, it is therefore necessary to identify every [a:eruption-suppression] player, which is not possible if two players are stacked.
      After [a:eruption-suppression]s start, all players (except the tanks) begin to move directly across to the southeast of the arena. Avoid baiting an [a:eruption-suppression] too close to either tank at all costs. While moving across, each player identifies the mechanic they have. There are only three possibilities:
      * You are baiting an [a:eruption-suppression], in which case you go all the way across to the southeast, then (if you're not also the target for [a:rock-throw-suppression]) you rotate clockwise to avoid the last [a:eruption] and [a:feather-rain], then move back to hit the Granite Gaol.
      * You have a [a:mistral-song-suppression] marker above your head, in which case you immediately begin heading towards the tanks at the southwest as soon as you realize it, and stand directly in-between both tanks. After the tanks have soaked [a:mistral-song-suppression], all four players at the southwest move southeast to help out with killing the Granite Gaol. Dodge [a:great-whirlwind] if necessary.
      * You have nothing, in which case you have [a:light-pillar]. Pretend you have [a:eruption-suppression]s and follow the other players to the southeast, then break off from the rest of the party and begin to move counter-clockwise around the arena (don't go too far out to avoid Featherlances) to safely bait [a:light-pillar] away from the party.
      After the Granite Gaol is destroyed, the remaining tank with [s:thermal-low] moves to intercept [a:mesohigh-suppression] at the northwest of the arena. All other players stack together close to where the Granite Gaol used to be. This baits the [a:landslide-woken] towards the stack. Dodge the [a:landslide-woken], then move back to where you previously stacked to soak [a:flaming-crush] and bait [a:feather-rain]. Mitigate and heal for [a:tank-purge].
