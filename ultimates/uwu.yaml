  awakening:
    name: Awakening
    mechanic: hint
    description: |
      Expand this row to show a comprehensive explanation of how the fight's puzzle mechanic works.
      In the first three phases of the fight, you will face Garuda, Ifrit, and Titan (in that order). Prevailing against the respective primal is relatively simple, but each primal features a hidden puzzle mechanic that requires certain mechanics in this phase to be solved in a specific way. Failing to do so leads to an inevitable wipe in the intermission phase of the fight (after Titan), which requires four back-to-back limit break 3s.
      The key to unleashing those four required limit break 3s is a buff called [s:beyond-limits]. Any player with this buff can unleash a limit break "for free", meaning that however many limit break bars are used for their limit break, these bars will immediately be refunded after the limit break has finished executing. For example, if a player with [s:beyond-limits] uses limit break while at 2.5 limit break bars, they will execute a limit break 2, depleting all 2.5 limit break bars. The game then refunds the party 2 bars of limit break. [s:beyond-limits] is consumed in the process.
      In order to obtain [s:beyond-limits], a primal (Garuda, Ifrit, Titan) must be defeated while they are [s:woken]. This leaves behind a small light puddle on the floor wherever they were defeated. When a player steps into this puddle, they gain [s:beyond-limits] (assuming they don't already have one) and the puddle disappears.
      Since there are three primals in total before reaching intermission and four required limit break 3s, this means that all three primals must be [s:woken] to get 3× [s:beyond-limits], allowing the limit break bars to be refunded 3 times. The last limit break will not be refunded.
      Unfortunately, [awakening](s:woken) a primal also upgrades their moveset, giving some of their abilities additional effects or follow-ups. A full list of these enhancements can be found [here](s:woken).
      As previously mentioned, [awakening](s:woken) a primal requires certain mechanics to be resolved in a specific, non-obvious way to gradually grant them stacks of [s:aetherially-charged]. At 4 stacks, [s:aetherially-charged] upgrades into [s:woken].
      * Garuda obtains stacks of [s:aetherially-charged] whenever a [s:thermal-low:2] is cleansed. This also triggers a heavy raidwide ([a:super-cyclone-2]), so cleansing multiple [s:thermal-low:2]s at the same time is impossible. [s:thermal-low] can be cleansed in one of two ways: by having players step into the bubble left behind by the Spiny Plume, or by soaking a [a:mesohigh] tether. There are two [a:mesohigh] tethers in Garuda's phase, but they resolve at the same time, so we can only cleanse one [s:thermal-low:2] there because otherwise, as mentioned, the raidwide damage would turn lethal. This means that the other 3 [s:thermal-low:2] cleanses need to come from the Spiny Plume bubble.
      * Ifrit obtains stacks of [s:aetherially-charged] whenever an Infernal Nail is hit at least twice by an [a:eruption], then destroyed. This also makes the Infernal Nail grow and gain [s:damage-up] and [s:vulnerability-down], so it is recommended to get their health low (but not too low) *before* hitting them with [a:eruption]. There are only 4 Infernal Nails during Ifrit's phase, so if any Nail is missed or destroyed too early, [s:woken] can no longer be achieved.
      * Titan obtains stacks of [s:aetherially-charged] for every 3 seconds that he dwells within a [s:sludge] puddle. [s:sludge] puddles only spawn when a Granite Gaol detonates by means other than player attacks. Granite Gaols occur twice in Titan's phase, but only the first instance affords players the opportunity to instantly detonate a Gaol by means of clipping it with [a:burst]. However, [a:burst] always takes place on the opposite side of the arena from Titan and Titan cannot be moved until the resulting [s:sludge] puddles dissipate. The only way to force Titan to stand in a [s:sludge] puddle, therefore, is to bring the [s:sludge] to him by triggering a chain reaction of multiple back-to-back Granite Gaols which detonate each other in a line from one side of the arena to the other, where Titan stands.
      The intermission requires a mandatory caster limit break 3, healer limit break 3, melee limit break 3, and tank limit break 3, in that order, so you'll need a caster, healer, and melee with [s:beyond-limits]. In general, the pick-up order for [s:beyond-limits] is that the healer picks up the Garuda puddle, caster picks up the Ifrit puddle, and melee the Titan puddle. You can use the following mental helper to remember the order: Garuda is green, as are healers. A summoner (SMN) can use all three primals in their rotation, but the only one with significant cast times is Ifrit. Titan primarily deals melee physical damage, just like a melee DPS.
      After getting through intermission, you reach the final phase of the fight, where you face off against the Ultima Weapon. But in this alternate timeline there is no Hydaelyn to wrest the primals' powers from the Ultima Weapon, so you will not only be facing off against an Ultima Weapon that is fully powered by all three primals; you will face off against an Ultima Weapon that is fully powered by three *[s:woken]* primals.
