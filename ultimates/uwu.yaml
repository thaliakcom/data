  primal-roulette:
    name: Primal Roulette
    mechanic: mech
    emphasis: more
    compact: trim
    description: |
      [boss:c] inflicts [s:viscous-aetheroplasm] on three random party members, then each of the three primals briefly appears to execute one mechanic and a raidwide before leaving again.
      The order in which the primals appear is random, but Ifrit can never appear last and Titan can never appear in the middle. This means that there are only three possible patterns: Ifrit -> Garuda -> Titan, Garuda -> Ifrit -> Titan, or Titan -> Ifrit -> Garuda.
      Garuda executes a [a:wicked-wheel-woken], an [a:aerial-blast], and leaves with a [a:feather-rain].
      Ifrit executes [a:eruption-roulette]s, two [a:crimson-cyclone]s covering all cardinals, and concludes with a [a:hellfire].
      Titan executes [a:weight-of-the-land-woken] and an [a:earthen-fury].
    resolve: |
      Primal Roulette is relatively trivial to resolve as long as sufficient healing and mitigation is present for the raidwides. Since Ifrit's [a:crimson-cyclone] always leaves the intercardinals safe, try to always preposition north until you know what primal you're getting, so that you don't end up baiting an [a:eruption-roulette] on top of the intercardinal safe spot.
    children:
    - at: 0
      id: viscous-aetheroplasm-random
    - at: 10820
      id: primal-roulette-ifrit
      link: or
    - at: 10820
