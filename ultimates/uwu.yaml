  diffractive-laser:
    id: 11128
    mechanic: tb.mt
    shape: chariot
    damage: 13680
    description: Moderate tankbuster.
  ultimate-predation:
    id: 11126
    mechanic: mech.trio
    emphasis: more
    compact: trim
    description: |
      [boss:c] becomes untargetable and teleports to a random intercardinal at the edge of the arena.
      Garuda spawns on a random intercardinal close to the center of the arena.
      Ifrit spawns on a random intercardinal at the edge of the arena, like [boss].
      Titan spawns on a random cardinal at the edge of the arena. He's slightly offset to either side.
      After several seconds, all three primals and [boss] execute a mechanic:
      * Garuda uses [a:wicked-wheel-woken] and follows up with [a:wicked-tornado].
      * Titan aims a [a:landslide-woken] in the direction that he's facing and follows up with [a:landslide-followup]. Notably, this [a:landslide] is *not* baited towards a player.
      * Ifrit uses [a:crimson-cyclone-woken] and follows up with [a:crimson-cyclone-echo].
      * [boss:c] uses [a:ceruleum-vent], a close-range AoE that kills anyone close to [boss].
      All mechanics are executed simultaneously, except for [a:ceruleum-vent] which is executed two seconds later.
      Afterwards, Garuda screams for [a:feather-rain] and [boss] teleports back to the center of the arena, where it becomes targetable again.
    resolve: |
      While dodging all these mechanics at the same time may seem daunting, there is a simple strategy that requires very little thought and can be executed regardless of the exact pattern. The only downside is that it is quite precise.
      For this strategy, we exploit the fact that [a:wicked-tornado] has a finite range to outrange it, allowing us to ignore Garuda entirely and focus on Ifrit and Titan. To do this, identify which intercardinal Garuda has spawned on. The two cardinals farthest from her are now the "target cardinals". If one of those two cardinals has Titan on it, ignore it and go to the other cardinal. If neither cardinal has Titan on it, then either cardinal is safe. If possible, you may wish to select the cardinal perpendicular from Ifrit. This way you don't have to worry about [a:crimson-cyclone-woken].
      For this strategy, we're going to use the runes behind the edge on the outside of the arena. The pattern just behind the death wall on the outside of the arena features two rows of various runes that circle the arena, excluding the cardinals themselves.
      After going to the cardinal, find the *fourth* rune from the cardinal, either clockwise or counter-clockwise. Every fourth rune is safe from [a:wicked-tornado], [a:landslide-followup], and [a:crimson-cyclone-echo], *but not* [a:ceruleum-vent], so make sure the rune you choose is not near [boss].
      Before going to that rune, check if the rune will be hit by the first [a:crimson-cyclone-woken] hit or a [a:landslide]. If yes, wait until the first hit is done, then go to the rune. If not, you can go to the rune right away and wait there until you hear Garuda scream.
    tips:
      - Since this is a purely individual mechanic, the only way you can cause a wipe here is if you move too early at the end and bait [a:feather-rain] in a bad location. Even then a wipe is unlikely.
      - If you're not feeling confident, you can simply follow someone else until you've gotten a feel for the logic and the positioning.
      - This strategy has only one "cursed" pattern. In this pattern, [boss], Ifrit, and Titan are all on the half of the arena safe from Garuda. If this happens, the only safe rune is directly under Ifrit, meaning you have to wait until the first hit of [a:crimson-cyclone-woken] has executed and then quickly move to the rune.
    children:
    - at: 4455
      id: <untargetable>
      description: |
        [boss:c] becomes untargetable and teleports to a random position on the edge of the arena.
    - at: 14837
      id: landslide-woken
      link: and
    - at: 14837
      id: crimson-cyclone-woken
      link: and
    - at: 14837
      id: wicked-wheel-woken
    - at: 16843
      id: ceruleum-vent
    - at: 22188
      id: feather-rain
  ultimate-annihilation:
    id: 11596
    mechanic: mech.trio
    emphasis: more
    compact: trim
    description: |
      [boss:c] becomes untargetable and teleports to the north of the arena, where it becomes targetable again.
      At the same time, Garuda spawns at the south of the arena, Titan southwest, and Ifrit southeast (or vice-versa).
      First, three back-to-back [a:weight-of-the-land-woken] are baited underneath random players while one player is targeted for [a:flaming-crush] and another for [a:mesohigh-annihilation]. The [a:mesohigh-annihilation] tether can be passed.
      After [a:flaming-crush] Garuda uses [a:eye-of-the-storm] and the first of four [a:aetheroplasm] orbs spawns. Each orb spawns at the northwest of [boss]'s hitbox and begins moving toward a random party member. When a player touches it, the orb explodes, dealing moderate damage to any nearby player and briefly tethering all nearby players to [boss]. For every player tethered the duty gauge climbs by one point, and the length of the tethers between orbs during [a:aetheric-boom] is increased.
      After the first [a:mesohigh-annihilation] resolves, Ifrit uses [a:inferno-howl] to inflict [s:searing-wind] on a random healer. After a [a:feather-rain] another [a:aetheroplasm] orb spawns. Titan now begins casting an unbaited [a:landslide-woken] and Ifrit [a:crimson-cyclone-woken]. Another [a:aetheroplasm] orb spawns, another [a:eye-of-the-storm] happens, and the final [a:aetheroplasm] orb spawns while Garuda casts out a second [a:mesohigh-annihilation] tether.
      There's a [a:tank-purge], another [a:feather-rain], and then [boss] briefly becomes untargetable as it teleports into the center of the arena for a last [a:eye-of-the-storm].
    resolve: |
      A lot happens during this mechanic and it may all seem rather unstructured and borderline random on first glance, but the resolution is relatively straightforward.
      First, stack at the northeast of [boss]'s hitbox (which, since [boss] is facing the center of the arena, is towards the southwest of the arena). When the first [a:weight-of-the-land] appears, move directly across to [boss]'s northwest to bait another [a:weight-of-the-land], then back again. After the third [a:weight-of-the-land], have everyone split into one of four directions:
      * Both your tanks and a designated melee go back to the northwest to soak the [a:aetheroplasm] orb that has just spawned there. We want this orb to be soaked by three players for a future mechanic ([a:aetheric-boom]). These three players stay there for the second orb as well. After soaking the second orb, they move up and stack directly north.
      * One of your rangeds (ordinarily the physical ranged; they must still have a [s:thermal-low] stack from Phase 1) goes south to pick up and soak the [a:mesohigh-annihilation] tether. After [a:mesohigh-annihilation] resolves, they hurry to join the party north. Be aware that this player has no reason to go all the way south. They just need to avoid stacking with other players and avoid being too close to the [s:searing-wind] healer. Moving too far south will make it difficult to rejoin the party before [a:crimson-cyclone-woken].
      * Your healers go directly west, away from everyone else. One of them will now be inflicted with [s:searing-wind]. They stay west. The other healer joins the rest of the group at the southeast of [boss]'s hitbox. The healer with [s:searing-wind] waits until the [a:mesohigh-annihilation] player has soaked the [a:mesohigh-annihilation] tether and moved away from south, then this healer replaces their spot south.
      * Everyone else moves up, towards the southeast of [boss]'s hitbox. They wait there until the [a:feather-rain] has happened, then move north.
      At this point everyone should be directly north, except the healer with [s:searing-wind], who should be directly south. Wait for [a:crimson-cyclone] and then move clockwise to the next intercardinal to dodge [a:crimson-cyclone-echo]. Only the tank designated to soak the last two orbs moves counter-clockwise instead. If you do this dodge, you can ignore Titan's [a:landslide-woken] entirely.
      Move in to avoid [a:eye-of-the-storm] and have the tank who moved counter-clockwise soak the last two orbs solo. The [s:searing-wind] healer moves back south (inside the [a:eye-of-the-storm]) and picks up the [a:mesohigh-annihilation] tether. Since [s:searing-wind] can randomly target either healer here, it's important that both healers still have their [s:thermal-low] stack.
      Mitigate the [a:tank-purge], avoid the [a:feather-rain], step in for another [a:eye-of-the-storm], and the mechanic is over. Make sure your [s:searing-wind] healer doesn't rejoin the party until their debuff has expired a short while after [a:eye-of-the-storm].
    children:
    - at: 4453
      id: <untargetable>
    - at: 8728
