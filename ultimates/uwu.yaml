      description: |
          Garuda screams and flies away, becoming untargetable.
          The Satin Plumes should be dead by this point, but **not** the Spiny Plume. It *must* be allowed to cast its second [a:cyclone] first or a wipe is all but guaranteed. It is recommended to leave the Spiny Plume alive until [a:mistral-shriek]. The earlier you kill it, the less time you have for [s:thermal-low:2] cleanses.
    - at: 16463
      id: cyclone
      timing: skippable
    - at: 17130
      id: feather-rain
    - at: 18823
      id: <targetable>
      description: Garuda returns to the arena.
    - at: 20336
      id: thermal-tumult
      timing: skippable
  gigastorm:
    id: 11078
    mechanic: aoe
    major: true
    shape: chariot
    compact: trim
    description: |
      The Spiny Plume explodes a short while after being killed. Kills all players caught in its radius, then leaves behind a bubble.
      When a player steps into the bubble, all stacks of [s:thermal-low] are cleansed from them, triggering [a:super-cyclone]. They are also granted [s:thermal-high] for as long as they remain within the bubble, reducing all wind damage taken (primarily affecting [a:super-cyclone] and [a:friction]).
      If a player is inflicted with [s:thermal-low] while inside the bubble, [s:thermal-low] is instantly cleansed, triggering [a:super-cyclone-1].
      The bubble lasts for approximately 23 seconds. During this time (assuming the Spiny Plume is not killed too early or too late), Garuda casts 2× [a:friction], a small AoE targeting a random player that deals heavy damage and inflicts a stack of [s:thermal-low] on all players hit.
      The more stacks of [s:thermal-low] a player has when they enter the bubble, the more damage [a:super-cyclone] deals from the resulting cleanse. At [s:thermal-low:3], [a:super-cyclone] deals lethal damage to all players.
    resolve: |
      The bubble left behind by the Spiny Plume is key to granting [s:woken] to Garuda. The recommended order of operations is this:
      1. All players except the Spiny Plume tank (who should be the only player with [s:thermal-low:2]) enter the bubble immediately.
      2. After all players have entered the bubble and the damage from [a:mistral-shriek] has been healed, the Spiny Plume tank enters the bubble to cleanse their stacks, triggering [a:super-cyclone-2] and granting Garuda her first stack of [s:aetherially-charged].
      3. The Spiny Plume tank and both melees exit the bubble. Note that everyone should remain stacked here. Even the players who are now outside the bubble should remain stacked with the players inside the bubble, else [a:friction] may miss some players.
      4. Garuda casts [a:friction]. If everyone is properly stacked, this grants the players outside the bubble (i.e. the Spiny Plume tank and both melees) [s:thermal-low] and triggers 5× [a:super-cyclone-1] (from the players inside the bubble whose [s:thermal-low] stack is instantly cleansed).
      5. All players exit the bubble. Just like before, remain stacked. Heal the damage.
      6. Garuda casts [a:friction], granting the Spiny Plume tank and the two melees [s:thermal-low:2] and everyone else [s:thermal-low].
      7. Wait for heals, then the first melee briefly steps into the bubble and back out, cleansing their [s:thermal-low:2], triggering [a:super-cyclone-2], and granting Garuda [s:aetherially-charged:2].
      8. Wait for heals, then the second melee briefly steps into the bubble and back out, cleansing their [s:thermal-low:2], triggering [a:super-cyclone-2], and granting Garuda [s:aetherially-charged:3].
      For this strategy to work, killing the Spiny Plume at the correct time (roughly in-between Garuda flying away and casting [a:mistral-shriek]) is essential. Kill it too early and the bubble fades before the second melee has had the chance to cleanse their [s:thermal-low:2], guaranteeing a wipe as it is no longer possible to awaken Garuda. Kill the Spiny Plume too late and the Spiny Plume tank doesn't have time to cleanse their [s:thermal-low:2] before the first [a:friction], or they wind up with the wrong number of [s:thermal-low] stacks.
      By the time the bubble fades, Garuda should be at [s:aetherially-charged:3], one tank should be at [s:thermal-low:2], and all other players but the melees should be at [s:thermal-low]. Garuda is not yet [s:woken] here. We'll be awakening Garuda later by having the [s:thermal-low:2] tank soak [a:mesohigh].
      **For healers**: Depending on how early the Spiny Plume dies, there may be a very limited amount of time for the melees' [s:thermal-low:2] cleanses before the bubble fades. Therefore, try precasting your heals so that the heal cast finishes just as the damage is applied to reduce the time that melees have to wait before the next one can cleanse.
      **For melees**: Using [a:second-wind] and [a:bloodbath] after [a:friction] is a must, as you will be taking the most damage out of anyone. At the start of the fight, discuss which of you will cleanse first.
    trivia: |
      The developers likely intended for all four [s:thermal-low:2] cleanses to take place during the bubble, awakening Garuda immediately. However, since that would represent a very tight heal check and an alternative exists, virtually no party does it this way. It is possible, however, to awaken Garuda during the bubble, in which case the phase completely changes since you'll be facing [s:woken] mechanics immediately. (Or at all, since most parties defeat Garuda just after awakening her, which serves as more evidence that this is a dev-unintended strategy since you skip all of her [s:woken] mechanics this way.)
      The alternative in question (namely [a:mesohigh]) is likely a "bug" – in a way. [a:mesohigh] cleansing [s:thermal-low] is definitely intended since [s:thermal-low] is required to survive it, and if [a:mesohigh] did not cleanse [s:thermal-low] it would mean that you could simply designate a single player to soak all [a:mesohigh] tethers during the fight. However, the developers likely did not intend for [a:mesohigh] to be able to grant [s:aetherially-charged].
    children:
    - at: 4587
      id: super-cyclone-2
      description: Tank cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged].
      timing: player
    - at: 8105
      id: friction
    - at: 9579
      id: super-cyclone-1
      description: All 5 players still in the bubble automatically cleanse [s:thermal-low], triggering 5 mild raidwides.
      count: 5
      timing: player
    - at: 14423
      id: friction
    - at: 22089
      id: super-cyclone-2
      description: The first melee cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged:2].
      timing: player
    - at: 24455
      id: super-cyclone-2
      description: The second melee cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged:3].
      timing: player
