  ultima-aether:
    name: Ultima Aether
    mechanic: hint
    description: |
      A duty gauge subtitled "Ultima Aether" appears as the phase begins. When this gauge reaches 100, [boss] gains [s:damage-up-ultima] and begins its enrage sequence as soon as possible, after it has concluded whatever it is currently doing. This means that your ultimate goal should be to keep this gauge as low as possible to delay the enrage.
      The background around the arena changes at 20, 40, 60, 80, and 100 duty gauge points.
      The duty gauge climbs under the following conditions:
      * At certain moments in the fight, the duty gauge climbs by 4. This is not tied to any particular ability being cast. In total, the duty gauge climbs this way 11 times (by 44 points).
      * Whenever a player dies, the duty gauge climbs by 4.
      * Whenever an [a:aetheroplasm] orb is soaked, the duty gauge climbs by an amount equal to the number of players who soaked the orb. This only affects the orbs during [a:ultimate-annihilation], not [a:aetheric-boom].
      * At the end of the fight, if the duty gauge is not yet at 100, [boss] begins channeling aether at a rate of 2 points per second until the duty gauge is at 100.
