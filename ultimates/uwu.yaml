  friction:
    id: 11080
    mechanic: aoe
    shape: chariot
    damage: 13478
    players: 8
    description: Circular AoE centered on a random unmarked player. Inflicts [s:thermal-low] on all players hit.
    resolve: |
      To resolve later mechanics, it is necessary to accrue as many [s:thermal-low] stacks as possible, so simply make sure all players are stacking tightly to avoid anyone missing the AoE.
      Be aware that any player inside the bubble produced by the Spiny Plume will immediately cleanse their [s:thermal-low] stack.
  aerial-blast:
    id: 11093
    mechanic: raidwide.ultimate
    damage: 18874
    description: Heavy raidwide.
  aerial-blast-enrage:
    id: 11093
    mechanic: enrage
    damage: 999999
    description: Garuda enrages, killing all players.
  mistral-song:
    id: 11083
    mechanic: aoe.intercept
    shape: line
    count: 2
    tank-damage: 17000
    damage: 6000
    players: 7
    description: |
      Marks a random DPS and healer. After a short delay, Chirada and Suparna (who spawn on random cardinals outside the arena) each fire a [ms:line] AoE towards their marked player, dealing heavy damage to the first player in line and mild damage to all remaining players.
      A [a:great-whirlwind] then spawns wherever the first players in line stood when they took the hit.
  eye-of-the-storm:
    id: 11090
    mechanic: aoe
    shape: dynamo
    description: Wide [ms:dynamo] around the center of the arena.
  wicked-wheel:
    id: 11086
    mechanic: aoe
    shape: chariot
    description: Moderate [ms:chariot] AoE centered on Garuda.
  wicked-wheel-woken:
    id: 11086
    name: Wicked Wheel (Woken)
    mechanic: aoe
    shape: chariot
    description: Moderate [ms:chariot] AoE centered on Garuda. Is immediately followed up by [a:wicked-tornado]. Only when Garuda is [s:woken].
    children:
    - at: 2099
      id: wicked-tornado
  mesohigh:
    id: 11081
    mechanic: spread.tethers
    shape: chariot
    count: 2
    damage: 3905
    description: Chirada and Suparna spawn east and west and tether to a random player. The tether can be passed. After a short time the tether resolves, dealing mild damage to the tethered player and cleansing their [s:thermal-low] stacks and those of anyone in close proximity to them. Deals lethal damage if the player has no [s:thermal-low] stacks.
    resolve: |
      Have your tank (with [s:thermal-low:2]) soak the east tether and your caster (with [s:thermal-low]) the west tether. This grants Garuda her last [s:aetherially-charged] stack, granting her [s:woken].
      At this point only your healers, physical ranged DPS, and one tank should still have a [s:thermal-low] stack. Your physical ranged DPS and one random healer (hence why both healers need [s:thermal-low]) will need them to resolve [a:mesohigh] tethers during [a:ultimate-annihilation]. Your tank will need it to resolve a [a:mesohigh] tether during [a:ultimate-suppression].
    trivia: |
      [a:mesohigh] tethers cleansing [s:thermal-low] is intended, as [s:thermal-low] is required to soak [a:mesohigh] and the developers didn't want the same player to be able to soak [a:mesohigh] twice. However, this cleanse being able to grant [s:aetherially-charged] if a [s:thermal-low:2] is cleansed is likely a bug, or at least an unintended strategy, as it completely deviates from the way you accumulate [s:aetherially-charged] during Titan and Ifrit, not to mention the fact that, by [awakening](s:woken) Garuda so late, you're skipping every single [s:woken] mechanic. You're likely meant to cleanse 4× [s:thermal-low:2] with the Spiny Plume bubble, but this is an *extremely* tight heal check and results in you seeing the [s:woken] mechanics much sooner, so it is not recommended.
  wicked-tornado:
    id: 11087
    mechanic: aoe
    shape: dynamo
    description: Moderate [ms:dynamo] AoE centered on Garuda. Same size as [a:wicked-wheel], but inverted. Always directly follows [a:wicked-wheel], but only when Garuda is [s:woken].
  kill-time:
    name: Target Kill Time
    mechanic: hint
    major: true
    description: |
      With current gear and job kits, most experienced parties can kill the boss at around this time.
      **For Garuda, do not attempt to kill the boss sooner than this** or a wipe is guaranteed. Garuda is currently the only primal that can be killed before you get the chance to [awaken](s:woken) them.
  ifrit-transition:
    name: Ifrit Transition
    mechanic: mech
    compact: trim
    description: |
      Ifrit jumps into the arena on a random cardinal and prepares to cast [a:crimson-cyclone], a dash through the middle of the arena that deals massive damage to anyone caught in its wake.
      Just before [a:crimson-cyclone] resolves, the entire arena gets covered in [a:radiant-plume]s except for one safe spot at either the east or west and one safe spot at either the north or south.
    resolve: |
      After Garuda dies, spin your camera around, looking for Ifrit. Once you've spotted him, turn your camera 90° to either side, looking at one of the two adjacent cardinals. Use [a:sprint] preemptively here or you'll need inhuman reflexes to make it to the safe spot in time.
      When [a:radiant-plume]s spawn:
      * If the cardinal you're looking at has no [a:radiant-plume] on it, sprint towards it.
      * If the cardinal you're looking at has a [a:radiant-plume] on it, sprint backwards, as the opposite cardinal does not have a [a:radiant-plume] covering it.
    children:
    - at: 6980
      id: crimson-cyclone
    - at: 8005
      id: radiant-plume
      description: AoEs that cover the entire arena except a small safe spot in either
          the west or east, and north or south.
      count: 10
  crimson-cyclone:
    id: 11103
    mechanic: aoe
    shape: line
    damage: 21404
    players: 0
    description: |
      Ifrit or a clone of his dashes across the arena, dealing massive damage to anyone caught in the dash.
      When [s:woken], is immediately followed up by another two [a:crimson-cyclone]s at a 45° angle to either side of the first dash.
  radiant-plume:
    id: 11105
    mechanic: aoe
    shape: chariot
    description: Pseudo-random AoEs.
  hellfire:
    id: 11102
    mechanic: raidwide.ultimate
    damage: 19856
    description: Heavy raidwide.
  hellfire-nails:
    id: 11102
    mechanic: raidwide.ultimate
    damage: 19856
    description: Heavy raidwide. Deals lethal damage if any Infernal Nail was left alive.
  hellfire-enrage:
    id: 11102
    mechanic: enrage
    damage: 999999
    description: Ifrit becomes untargetable and casts Hellfire again, wiping the party.
  vulcan-burst:
    id: 11095
    mechanic: mech.knockback
    damage: 1000
    description: |
      Deals mild damage and knocks all players back a moderate distance.
      If this attack is fully mitigated (i.e. dealing no damage to anyone's health) the knockback is not applied.
    resolve: A simple [a:eukrasian-prognosis] or [a:succor] is enough to fully mitigate the damage and skip the knockback.
  incinerate:
    id: 11094
    mechanic: tb.mt
    shape: cone
    damage: 22269
    description: Heavy conal tankbuster on the primary target. Inflicts [s:fire-resistance-down-ii].
  infernal-nails:
    id: 461
    name: Infernal Nails
    mechanic: mech
    major: true
    description: |
      Spawns 4 Infernal Nails in a randomly rotated trapezoid pattern. Destroying a nail deals moderate damage ([a:infernal-surge]) and inflicts a stacking [s:vulnerability-up] on all players. All four nails must be destroyed before Ifrit jumps away or the subsequent [a:hellfire] deals lethal damage.
      When an Infernal Nail is hit by an [a:eruption] it grows, gaining [s:vulnerability-down] and [s:damage-up], up to a maximum of two stacks. If a nail is destroyed at two stacks, Ifrit gains one stack of [s:aetherially-charged].
      Additionally, the order in which the nails are destroyed determines the order of the subsequent [a:crimson-cyclone] dashes.
    resolve: |
      To finish the fight, Ifrit must be [s:woken]. To do this, all nails must be hit by at least 2 [a:eruption]s. [a:eruption]s are baited on the two farthest players from Ifrit, so have your two ranged DPS position themselves between the edge of the arena and the two outer nails. Communicate before the pull which ranged DPS takes which of the two nails. The main tank drags Ifrit to in-between the two inner nails to allow players to cleave both inner nails and Ifrit with AoEs while also ensuring [a:eruption]s are baited on the correct players.
      One random healer is targeted by [a:inferno-howl] when nails spawn. If the boss's new position in-between the inner nails is relative north, this healer moves to the very edge of the arena at relative south, between the two outer nails. They will periodically explode in a big AoE ([a:searing-wind]), instantly killing any players caught in the explosion. The explosion is large enough to clip the two outer nails, so melees must be extra careful when dealing damage to those two nails.
      Avoid using any heavy attacks on the nails. They do not have a lot of health, so it is very easy to accidentally destroy one before it has grown two times if you fail to take into account potential crits and direct hits.
      The nails' recommended kill order is the "reverse Z pattern": i.e. relative southeast, then relative southwest, then relative northeast, then relative northwest. This maximizes the time you have to dodge the subsequent [a:crimson-cyclone]s. (Note that, if the party has good damage, it is possible to skip those [a:crimson-cyclone]s, essentially rendering the nail kill order irrelevant. However, you should always expect to see the [a:crimson-cyclone]s.)
    children:
    - at: 4100
      id: <targetable>
      description: Four Infernal Nails become targetable.
    - at: 9131
      id: infernal-fetters
    - at: 11089
      id: inferno-howl
    - at: 16745
      id: eruption
    - at: 17057
      id: searing-wind
    - at: 21205
      id: infernal-surge
      timing: push
    - at: 21965
      id: infernal-surge
      timing: push
    - at: 23078
      id: searing-wind
    - at: 26959
      id: infernal-surge
      timing: push
    - at: 29099
      id: searing-wind
    - at: 32172
      id: infernal-surge
      timing: push
  infernal-fetters:
    id: 11289
    mechanic: mech.tether.close
    damage: 3283
    players: 2
    description: |
      The player second-in-enmity is tethered to a random DPS and inflicted with [s:infernal-fetters].
      The farther those two players stray from each other, the more stacks of [s:infernal-fetters] they accrue. The more stacks they have, the less damage they deal, and the more damage they take from their [t:DoT].
  inferno-howl:
    id: 11099
    mechanic: damage
    damage: 2524
    description: |
      Inflicts a random healer with [s:searing-wind], causing them to periodically explode and kill all nearby players.
      If a healer is already inflicted with [s:searing-wind], this is guaranteed to target the other healer.
  eruption:
    id: 11097
    mechanic: aoe.delayed
    shape: chariot
    description: |
      Selects the two farthest players from Ifrit and spawns 4 back-to-back AoEs beneath their feet.
      If these AoEs touch an Infernal Nail, the nail grows and is granted [s:vulnerability-down] and [s:damage-up], up to a maximum of two stacks.
    children:
    - at: 491
      id: eruption-hit
    - at: 2456
      id: eruption-hit
    - at: 4460
      id: eruption-hit
    - at: 6468
      id: eruption-hit
