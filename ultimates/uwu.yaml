    description: |
      Marks two random players who are not baiting [a:eruption]s. After a short delay, Chirada and Suparna (who spawn on the northwest and southeast of the arena) each fire a [ms:line] AoE towards their marked player, dealing heavy damage to the first player in line and mild damage to all remaining players.
      A [a:great-whirlwind] then spawns wherever the first players in line stood when they took the hit.
    resolve: |
      When [a:ultimate-suppression] starts, have your tanks preposition in the same location every time. The two players selected for [a:mistral-song-suppression] can then simply go to stand behind the tanks.
  mistral-song-cone:
