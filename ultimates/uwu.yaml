    compact: trim
    description: |
      The enrage sequence begins whenever the duty gauge has reached 100.
      Every three seconds whichever player is still alive and has dealt the least damage to [boss] in total is [stunned](s:stun), pulled into the middle of the arena, [lifted](s:airbound), and instantly killed ([a:citadel-siege-hit]).
      Once only one player is left, that player is pulled dead center and lifted like the others, but isn't killed immediately. Instead, [boss] steps forward and eats them alive while unleashing all its absorbed aether in a magical explosion several times more destructive than [a:ultima], wiping the party.
