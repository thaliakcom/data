  mistral-song:
    id: 11083
    mechanic: aoe.intercept
    shape: line
    count: 2
    tank-damage: 17000
    damage: 6000
    players: 7
    description: |
      Marks a random DPS and healer. After a short delay, Chirada and Suparna (who spawn on random cardinals outside the arena) each fire a [ms:line] AoE towards their marked player, dealing heavy damage to the first player in line and mild damage to all remaining players.
      A [a:great-whirlwind] then spawns wherever the first players in line stood when they took the hit.
    resolve: |
      [a:mistral-song] must be intercepted by tanks. To simplify things, have your party always stack on the same location (using a waymark is a good idea) and use a simple priority system to determine which tank intercepts which of the sisters.
  mistral-song-suppression:
