  downburst-woken:
    id: 11088
    name: Downburst (Woken)
    mechanic: tb.stack
    shape: cone
    damage: 17919
    description: Shared (two-player) tankbuster on the primary target.
  cyclone:
    id: 11077
    mechanic: tb.mt
    damage: 19229
    description: Heavy tankbuster on the target tethered to the Spiny Plume. Inflicts [s:thermal-low].
  feather-rain:
    id: 11085
    mechanic: aoe.delayed
    shape: chariot
    count: 5
    damage: 7256
    players: 0
    description: |
      Small invisible AoEs under 5 random players' past positions. The only warning you get is Garuda or her sisters (Chirada and Suparna) screaming approximately 2.5 seconds earlier and flying away.
      Any player hit takes significant damage and is inflicted with [s:windburn].
  thermal-tumult:
    id: 11076
    mechanic: enrage
    damage: 0
    description: If the Satin Plumes are not killed by this point, they enrage here. Deals no damage but inflicts [s:sleep] on all players.
  mistral-shriek:
    id: 11092
    mechanic: raidwide
    damage: 16458
    description: Heavy raidwide.
  gigastorm:
    id: 11078
    mechanic: aoe
    shape: chariot
    description: |
      The Spiny Plume explodes a short while after being killed. Kills all players caught in its radius, then leaves behind a bubble.
      Players in the bubble are afflicted with [s:thermal-high] and take reduced wind damage. Stacks of [s:thermal-low] are instantly cleansed from a player once they step inside the bubble, triggering [a:super-cyclone-1]. The bubble lasts for approximately 23 seconds.
    resolve: |
      Kill the Spiny Plume sometime between its second and third [a:cyclone]. If you kill it too early, you will be missing a crucial [s:thermal-low] stack and, more importantly, the bubble will fade before you've had the chance to cleanse enough [s:thermal-low] stacks, making it impossible to [awaken](s:woken) Garuda and guaranteeing a wipe. Kill it too late and the Spiny Plume tank will be inflicted with [s:thermal-low:3], which cannot be cleansed without causing a wipe.
      All players should enter the bubble initially except for the Spiny Plume tank, who should wait until the damage from [a:mistral-shriek] is healed before stepping into the bubble. This triggers the first [a:super-cyclone-2] and grants Garuda her first stack of [s:aetherially-charged].
      Afterwards, before the first [a:friction] both melees (as is standard for PF, but you may choose any two players) and the Spiny Plume tank should exit the bubble while still stacking with the rest of the party. The first [a:friction] takes place and inflicts [s:thermal-low] on the three players outside the bubble while immediately cleansing the [s:thermal-low] stacks of anyone inside the bubble, triggering 5× [a:super-cyclone-1]. Heal this damage up before the second [a:friction].
      All players now exit the bubble before the second [a:friction]. If done correctly, all players should end up with [s:thermal-low], while the melees and tank end up with [s:thermal-low:2]. What follows is most likely the toughest heal check in the fight – both melees must now consecutively cleanse their [s:thermal-low:2]. They must do so by stepping into the bubble in the brief amount of time before it disappears, but since each cleanse triggers a heavy [a:super-cyclone-2], all players must be nearly fully healed in-between each cleanse. If the melees play it too safe, waiting for heals for too long, the bubble will fade and a wipe is guaranteed. If the healers don't heal the party back up quickly enough, the melees are either forced to cleanse with the party too low to survive it (causing a wipe) or forced to wait until the bubble disappears, again guaranteeing a wipe. Use whatever mitigation and personal healing tools you can afford here. Personal cooldowns such as [a:second-wind], [a:curing-waltz], [a:riddle-of-earth], or [a:bloodbath] are particularly valuable here.
      If done correctly, you should end up with 5 players with [s:thermal-low], 2 players with nothing, and 1 player with [s:thermal-low:2], as well as [s:aetherially-charged:3] on Garuda.
    children:
    - at: 4587
      id: super-cyclone-2
      description: Tank cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged].
      timing: player
    - at: 8105
      id: friction
    - at: 9579
      id: super-cyclone-1
      description: All 5 players still in the bubble automatically cleanse [s:thermal-low], triggering 5 mild raidwides.
      count: 5
      timing: player
    - at: 14423
      id: friction
    - at: 22089
      id: super-cyclone-2
      description: The first melee cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged:2].
      timing: player
    - at: 24455
      id: super-cyclone-2
      description: The second melee cleanses [s:thermal-low:2], triggering a heavy raidwide and granting Garuda [s:aetherially-charged:3].
      timing: player
