status:
  stun:
    id: 149
    type: impairment
    duration: [10000, 2000]
    description: Inflicted by [a:slipstream] (10 seconds) and [a:upheaval] (2 seconds).
  thermal-low:
    id: 1525
    type: condition
    description: |
      Inflicted by [a:cyclone] and [a:friction]. Grants resistance to [a:mesohigh]. Without this status effect, [a:mesohigh] deals lethal damage to the player who takes the tether.
      This effect can be cleansed by taking a [a:mesohigh] tether, standing near a player who takes a [a:mesohigh] tether, or by entering the bubble left behind by the Spiny Plume to trigger [a:super-cyclone].
      Note that cleansing this effect deals raidwide damage. Cleansing [s:thermal-low] deals mild raidwide damage, cleansing [s:thermal-low:2] deals significant raidwide damage, and cleansing [s:thermal-low:3] deals unsurvivable raidwide damage.
      Every time a [s:thermal-low:2] is cleansed, Garuda gains one stack of [s:aetherially-charged]. At 4 stacks, [s:aetherially-charged] transforms into [s:woken].
      [s:thermal-low] stacks persist through death.
  aetherially-charged:
    id: 1528
    type: indicator
    affects: enemy
    description: |
      A "transitional" state. Has no effect on its own, but indicates that the primal (Garuda, Ifrit, or Titan) is in the process of becoming [s:woken].
      The primal becomes [s:woken] when this buff accumulates at least 4 stacks.
      Each primal has a different set of conditions for accumulating stacks of [s:aetherially-charged].
      * Garuda gains a stack of [s:aetherially-charged] each time a [s:thermal-low:2] is cleansed.
      * Ifrit gains a stack of [s:aetherially-charged] each time an Infernal Nail with [s:damage-up:2] and [s:vulnerability-down:2] is destroyed.
      * Titan gains a stack of [s:aetherially-charged] for every 3 seconds he remains within a sludge puddle left behind by a Granite Gaol exploding via [a:burst] or [a:freefire].
  windburn:
    id: 235
    type: dot
    tick: 6084
    duration: 18000
    description: Inflicted on players hit by [a:feather-rain].
  sleep:
    id: 1510
    type: impairment
    duration: 30000
    description: Inflicted on all party members when a Satin Plume isn't killed in time and executes [a:thermal-tumult]. Taking damage dispels the effect early.
  beyond-limits:
    id: 1530
    type: form
    affects: player
    description: |
      If a player with this effect uses limit break, all utilized limit break bars are instantly refilled after a short delay. This status effect is consumed in the process.
      Note that this refund only applies to "full" limit break bars, not partial ones, so for example if limit break 2 is used at 2.5 bars, it only refills 2 bars, not 2.5 bars.
      This effect is gained from stepping into a light puddle gained from defeating a [s:woken] primal.
      [s:beyond-limits] persists through death.
  thermal-high:
    id: 1526
    type: resistance
    description: |
      Grants moderate resistance to all wind damage.
      Granted on players inside the Spiny Plume's bubble, and on players who have soaked a [a:mesohigh] tether (for 3 seconds). In the case of the latter, this buff simply ensures that the player who soaked the tether does not die from the subsequent [a:super-cyclone](s).
  woken:
    id: 1529
    type: form
    description: |
      A primal (Garuda, Ifrit, or Titan) becomes [s:woken] when it accrues at least 4 stacks of [s:aetherially-charged]. See [s:aetherially-charged] for more information on how each primal accrues stacks of this buff.
      While [s:woken], the primal glows blue and certain abilities that they use are "upgraded" and have additional effects. Additionally, when a [s:woken] primal is defeated, they leave behind a small puddle of light. When a player steps inside this puddle, the puddle disappears and the player gains [s:beyond-limits].
      Progressing into the final phase of the fight requires exactly 3 players with [s:beyond-limits], so awakening the primals (despite its negative effects) is not optional.
      What follows is a list of all abilities that change when a primal is [s:woken]:
      * [a:wicked-wheel] is now immediately followed up with [a:wicked-tornado].
      * [a:downburst] stops being a [single-target tankbuster](m:tb.mt) and becomes a [shared tankbuster](m:tb.stack) instead.
      * [a:crimson-cyclone] is now immediately followed up with two additional [a:crimson-cyclone]s at a 45° angle to either side of the first one. Note that this only applies to the "true" Ifrit, not any of his clones. Look for the blue glow to identify the true Ifrit by his [s:woken] aura.
      * When [s:woken], [s:searing-wind] has a duration of 30 seconds, not 18.
      * [a:flaming-crush] now inflicts [s:accursed-flame], a [t:DoT] on all players hit. The duration of [s:accursed-flame] is reduced for each player hit.
      * When [a:weight-of-the-land] is used, now spawns 3 sets of AoEs under players, not just 2.
      * [a:landslide] is now immediately followed up with a second set of (untelegraphed) [a:landslide]s which hit in-between the first AoEs.
  infernal-fetters:
    id: 377
    type: impairment
    tick: 3862
    duration: 21000
    description: |
      Tethers a random DPS to the current off-tank. At any given point, the distance between the two players determines the number of [s:infernal-fetters] stacks. Each stack reduces damage dealt and increases the potency of a [t:DoT] on those two players.
      Inflicted by the action of the same name, [a:infernal-fetters].
  searing-wind:
    id: 1578
    type: dot
    tick: 3490
    duration: [18000, 30000]
    description: |
      Every 6 seconds, afflicted players explode in a large [ms:chariot] AoE that knocks all players caught into the wall.
      This effect has a duration of 30 seconds if Ifrit is [s:woken] and 18 seconds otherwise.
      Inflicted by [a:inferno-howl].
  damage-up:
    id: 1544
    type: damage-up
    description: Granted to Infernal Nails when hit by an [a:eruption], up to a maximum of [s:damage-up:2]. Increases damage dealt by [a:infernal-surge].
  vulnerability-down:
    id: 1545
    type: resistance
    description: Granted to Infernal Nails when hit by an [a:eruption], up to a maximum of [s:vulnerability-down:2]. Decreases damage taken.
  vulnerability-up:
    id: 202
    type: vuln
    duration: 1000
    description: |
      Brief stacking vulnerability inflicted by [a:infernal-surge]. Unlike most instances of this debuff in modern content, this does not represent a mechanical failure in The Weapon's Refrain and cannot, in fact, be avoided. It's merely a means for the fight to trigger a wipe (or at least several deaths) if you destroy too many nails at the same time. Try to wait one second in-between each nail kill and this debuff will have no effect.
  accursed-flame:
    id: 1527
    type: dot
    tick: 1263
    duration: [3000, 48000]
    description: Moderate [t:DoT] on all players hit by [a:flaming-crush] when Ifrit is [s:woken]. The duration of the [t:DoT] ranges from 3 seconds to 60 seconds depending on how many players are hit by [a:flaming-crush].
  fire-resistance-down-ii:
    id: 1255
    type: vuln
    duration: 5000
    description: Renders subsequent fire damage taken lethal. Inflicted by [a:incinerate-hit].
  fetters:
    id: 292
    type: impairment
    description: Player is trapped inside a Granite Gaol and cannot move or act until they are freed. While in this state they are fully immune to all effects, including damage or knockback effects from [a:landslide], [a:tumult], or [a:burst], as well as healing and raid buffs.
  sludge:
    id: 287
    type: dot
    tick: 999999
    description: Lethal [t:DoT] inflicted when a player steps into the puddles left behind by Granite Gaols that are destroyed by [a:rock-throw] or [a:freefire].
  doom:
    id: 210
    type: condition
    duration: 7960
    description: Kills the player if the debuff isn't cleansed in time. Can only be cleansed by a [i:healer] limit break 3. Inflicted by [a:blight].
  down-for-the-count:
    id: 783
    type: impairment
    duration: 3960
    description: Renders the player briefly unable to act or move. Inflicted by [a:blight].
  sabik-stun:
    id: 201
    type: impairment
    description: Player is stunned and pulled into the center of the arena, where they are lifted into the air, [s:stun] turns into [s:airbound], and they are instantly killed.
  airbound:
    id: 1533
    type: impairment
    description: Player cannot act as they are lifted into the air and instantly killed ([a:citadel-siege]).
  viscous-aetheroplasm:
    id: 1532
    type: delay
    duration: [10, 12, 32, 52]
    description: Player explodes ([a:aetheroplasm]) when the debuff expires. The explosion is a shared damage that should be stacked for.
  damage-up-ultima:
    id: 290
    type: damage-up
    description: Increases all of [boss]'s damage and begins its enrage sequence as soon as it has concluded whatever it is currently doing when the duty gauge reaches 100.
