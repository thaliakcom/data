  infernal-nails:
    id: 461
    name: Infernal Nails
    mechanic: mech
    emphasis: more
    description: |
      Spawns 4 Infernal Nails in a randomly rotated trapezoid pattern. Destroying a nail deals moderate damage ([a:infernal-surge]) and inflicts a stacking [s:vulnerability-up] on all players. All four nails must be destroyed before Ifrit jumps away or the subsequent [a:hellfire] deals lethal damage.
      When an Infernal Nail is hit by an [a:eruption] it grows, gaining [s:vulnerability-down] and [s:damage-up], up to a maximum of two stacks. If a nail is destroyed at two stacks, Ifrit gains one stack of [s:aetherially-charged].
      Additionally, the order in which the nails are destroyed determines the order of the subsequent [a:crimson-cyclone] dashes.
    resolve: |
      To finish the fight, Ifrit must be [s:woken]. To do this, all nails must be hit by at least 2 [a:eruption]s. [a:eruption]s are baited on the two farthest players from Ifrit, so have your two ranged DPS position themselves between the edge of the arena and the two outer nails. Communicate before the pull which ranged DPS takes which of the two nails. The main tank drags Ifrit to in-between the two inner nails to allow players to cleave both inner nails and Ifrit with AoEs while also ensuring [a:eruption]s are baited on the correct players.
      One random healer is targeted by [a:inferno-howl] when nails spawn. If the boss's new position in-between the inner nails is relative north, this healer moves to the very edge of the arena at relative south, between the two outer nails. They will periodically explode in a big AoE ([a:searing-wind]), instantly killing any players caught in the explosion. The explosion is large enough to clip the two outer nails, so melees must be extra careful when dealing damage to those two nails.
      Avoid using any heavy attacks on the nails. They do not have a lot of health, so it is very easy to accidentally destroy one before it has grown two times if you fail to take into account potential crits and direct hits.
      The nails' recommended kill order is the "reverse Z pattern", i.e. if you're facing the two close nails: relative southeast, then relative southwest, then relative northeast, then relative northwest. This maximizes the time you have to dodge the subsequent [a:crimson-cyclone]s. (Note that, if the party has good damage, it is possible to skip those [a:crimson-cyclone]s, essentially rendering the nail kill order irrelevant. However, you should always expect to see the [a:crimson-cyclone]s.)
    children:
    - at: 4100
      id: <targetable>
      description: Four Infernal Nails become targetable.
    - at: 9131
      id: infernal-fetters
    - at: 11089
      id: inferno-howl
