  aetheric-boom:
    id: 11144
    mechanic: mech.knockback
    emphasis: more
    damage: 2543
    description: |
      Knocks all players away from [boss] and spawns four sets of orbs.
      Each set consists of two orbs that are tethered to each other and begin slowly converging on each other. If the orbs touch, they explode and wipe the party. If either orb in a set is touched, it explodes ([a:aetheroplasm-boom]), dealing massive damage in a radius. The damage dealt by this attack is reduced by each player who is within the radius of the explosion. After soaking an orb in this way, both it and the orb it is tethered to disappear.
      The length of each tether is based on the [a:aetheroplasm] soaks during [a:ultimate-annihilation]. The more players soak each orb during [a:ultimate-annihilation], the longer the tether for the corresponding orb pair.
      An orb pair spawns on each intercardinal. The northwest orb pair corresponds to the first orb during [a:ultimate-annihilation] and the rest are situated in a clockwise manner, so the northeast orb pair corresponds to the second orb, the southeast pair to the third orb, and the southwest pair to the fourth orb.
    resolve: |
      Each soak deals massive amounts of damage, and there is very little time to heal in-between before you have to soak the next set. For this reason, it is recommended to split into two groups, but not light parties; soaking an orb with only 4 players would deal nigh-unsurvivable damage even with mitigation. Instead, Party Finder generally splits into a group that consists of both tanks and a group that consists of everyone else. The tank group soaks the southwest pair with defensive cooldowns, then the northwest pair. The other group soaks the southeast pair, then the northeast pair. Remember to wait for heals in-between.
      This strategy is why the 3-3-1-1 soaks are recommended during [a:ultimate-annihilation]. By having 3 players soak the first two orbs and only one player soak the last two orbs, the first two orb pairs that are soaked during [a:aetheric-boom] have the shortest possible tether. This is fine, since both groups will soak these orbs immediately by virtue of being knocked back directly into those orbs. The tethers for the second sets of orb pairs are slightly longer to allow for healing in-between.
      Keeping the tethers short also ensures that, no matter which of the two orbs of a given pair any individual player decide to soak, they will still be in range of the other orb's explosion in case someone touched the other orb first.
      It is also generally recommended to use a [i:tank] limit break here, regardless of how many limit break bars you have, to make the mitigation and healing slightly easier. The heavy raidwides during [a:primal-roulette] all but ensure that you'll have another limit break 3 before the end of the fight no matter what.
    children:
    - at: 4143
      id: aetheroplasm-boom
      timing: player
      link: then
    - at: 7398
      id: aetheroplasm-boom
      timing: player
  aetheroplasm-boom:
    id: 11145
    mechanic: stack
    shape: chariot
    damage: 25261
    description: An orb belonging to an orb pair during [a:aetheric-boom] explodes as a result of a player stepping into it, dealing heavy damage that is split between all players who soak the orb.
  viscous-aetheroplasm-random:
