  feather-rain:
    id: 11085
    mechanic: aoe.delayed
    shape: chariot
    count: 5
    damage: 7256
    players: 0
    description: |
      Garuda or her sisters (Chirada and Suparna) scream and fly away. Approximately 2.5 seconds later, small AoEs hit where 5 random players were at the time of the scream.
      The AoEs remain invisible until shortly before they resolve, too late to react to. Any player hit sustains significant damage and is inflicted with [s:windburn].
    resolve: |
      Try to stack with as many players as possible before the scream happens, then move away after. Since there is no cast bar, this necessitates knowing the fight's timeline to know exactly when each scream happens. Most of the fight is spent stacked with other players, so when in doubt simply stay stacked.
      Avoid moving early, as this is likely to place an AoE in the path of another player when they move to dodge.
  thermal-tumult:
    id: 11076
    mechanic: enrage
    damage: 0
    description: If any Satin Plume is still alive by this point, it enrages here. Deals no damage but inflicts [s:sleep] on all players.
  mistral-shriek:
    id: 11092
    mechanic: raidwide
    damage: 16458
    description: Heavy raidwide.
  plumes:
    name: Plumes
    mechanic: adds
    emphasis: more
    compact: trim
    description: |
      Four Satin Plumes spawn and each tether to a different DPS player. A Spiny Plume also spawns and tethers to the first player that deals damage to it. After a short delay, all plumes move toward the player they're tethered to.
      Satin Plumes are purple and largely unthreatening, but if left alive for too long they will cast [a:thermal-tumult], putting all players to [s:sleep] and guaranteeing a wipe.
      The Spiny Plume (green and larger than the Satin Plume) attacks the tethered player with [a:cyclone], a heavy tankbuster that cannot be survived by a non-tank. Each [a:cyclone] inflicts one stack of [s:thermal-low] on the tethered player.
      The Spiny Plume must be picked up (i.e. attacked first) by the off-tank. This is because every 9 seconds the Spiny Plume attacks the tethered player with [a:cyclone], a heavy tankbuster that cannot be survived by a non-tank. While the Spiny Plume does not have a "proper" enrage, [a:cyclone] gives it its own enrage (of sorts), as each [a:cyclone] inflicts a stack of [s:thermal-low] and any player reaching [s:thermal-low:3] all but ensures a wipe.
      When the Spiny Plume dies, it explodes with a moderate AoE ([a:gigastorm]) and leaves behind a bubble in the shape of that same AoE. Stepping into the bubble grants [s:thermal-high] and cleanses all [s:thermal-low] stacks. See [a:gigastorm] for more information.
    resolve: |
      Once the plumes spawn, the off-tank should attack the Spiny Plume immediately to force the Spiny Plume to tether them. [a:provoke] works as well. If the off-tank is too slow to attack it, a stray AoE from one of the other players is likely to hit it, causing it to tether to them instead and guaranteeing a wipe.
      The main tank tanks Garuda away from the party while all other party members (including the off-tank) stack behind Garuda and wait for the Satin Plumes to gather. AoE the Satin Plumes down as fast as possible. *Stop AoEing* the moment the last Satin Plume has died. Do *not* defeat the Spiny Plume until after Garuda has flown away for [a:feather-rain] or the resulting bubble does not last enough to resolve all mechanics.
    children:
    - at: 0
      id: <targetable>
      description: 1 Spiny Plume and 4 Satin Plumes spawn.
    - at: 3733
      id: slipstream
    - at: 7211
      id: downburst
    - at: 7344
      id: cyclone
      timing: skippable
    - at: 14549
