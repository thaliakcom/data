    damage: 13478
    players: 8
    description: Circular AoE centered on a random unmarked player. Inflicts [s:thermal-low] on all players hit.
    resolve: |
      To resolve later mechanics, it is necessary to accrue as many [s:thermal-low] stacks as possible, so simply make sure all players are stacking tightly to avoid anyone missing the AoE.
      Be aware that any player inside the bubble produced by the Spiny Plume will immediately cleanse their [s:thermal-low] stack.
  aerial-blast:
